<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio JTBP - Visualizador</title>
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .pantalla-laboratorio {
            background: #111;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #a68a44; /* Borde dorado JTBP */
            text-align: center;
            box-shadow: 0 0 30px rgba(166, 138, 68, 0.2);
        }
        canvas {
            background-color: #000;
            border-radius: 10px;
            margin-top: 20px;
            border: 1px solid #333;
        }
        button {
            background-color: #a68a44;
            color: black;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #a68a44;
        }
    </style>
</head>
<body>

    <div class="pantalla-laboratorio">
        <h2 style="color: #a68a44; margin-top: 0;">🧪 Laboratorio: Barras Rítmicas</h2>
        <p style="font-size: 14px; color: #888;">Presione Play para ver cómo reacciona el código al sonido.</p>
        
        <canvas id="visualizador" width="300" height="150"></canvas>
        <br>
        
        <audio id="audio-prueba" crossorigin="anonymous" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
        
        <button id="btn-play">▶️ REPRODUCIR Y VER MAGIA</button>
    </div>

    <script>
        const btnPlay = document.getElementById('btn-play');
        const audio = document.getElementById('audio-prueba');
        const canvas = document.getElementById('visualizador');
        const ctx = canvas.getContext('2d');

        let audioContext;
        let analyser;
        let source;
        let estaRodando = false;

        btnPlay.addEventListener('click', () => {
            // El navegador exige que el AudioContext se inicie con un clic del usuario
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                source = audioContext.createMediaElementSource(audio);
                
                source.connect(analyser);
                analyser.connect(audioContext.destination);
                
                analyser.fftSize = 256; // Cantidad de barras
            }

            if (audio.paused) {
                audio.play();
                btnPlay.innerText = "⏸️ PAUSAR";
                if (!estaRodando) {
                    animarBarras();
                }
            } else {
                audio.pause();
                btnPlay.innerText = "▶️ REPRODUCIR Y VER MAGIA";
            }
        });

        function animarBarras() {
            estaRodando = true;
            requestAnimationFrame(animarBarras);

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            
            // Leemos las frecuencias de la música en este milisegundo
            analyser.getByteFrequencyData(dataArray);

            // Limpiamos la pantalla negra
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const barWidth = (canvas.width / bufferLength) * 2.5;
            let barHeight;
            let x = 0;

            // Dibujamos cada barrita dorada
            for (let i = 0; i < bufferLength; i++) {
                barHeight = dataArray[i] / 1.5; // Ajustamos la altura

                // Color dorado estilo JTBP
                ctx.fillStyle = '#a68a44';
                
                // Dibujamos el rectángulo (x, y, ancho, alto)
                ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);

                x += barWidth + 2; // Espacio entre barras
            }
        }
    </script>

</body>
</html>
