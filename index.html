<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JTBP V6 - RADIOS REALES</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #151515;
            --primary: #d4af37;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; width: 100%; max-width: 500px; }
        .header h1 { color: var(--primary); margin: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        .header p { color: var(--text-muted); margin: 5px 0 0 0; font-size: 14px; } 
        
        .control-panel { background-color: var(--card-bg); padding: 15px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 5px 15px rgba(0,0,0,0.8); width: 100%; max-width: 500px; margin-bottom: 25px; }
        .panel-title { color: var(--primary); font-size: 12px; font-weight: bold; text-align: center; margin-bottom: 10px; text-transform: uppercase; }
        
        .channel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .channel-btn:last-child { grid-column: span 3; }

        .channel-btn { background-color: #252525; color: var(--text-main); border: 1px solid #444; padding: 10px 5px; border-radius: 8px; cursor: pointer; font-size: 10px; font-weight: bold; text-transform: uppercase; transition: all 0.2s ease; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; }
        .channel-btn .icon { font-size: 16px; }
        .channel-btn.active { background-color: var(--primary) !important; color: #000 !important; border-color: var(--primary) !important; }

        .player-stage { width: 100%; max-width: 500px; min-height: 350px; background-color: var(--card-bg); border-radius: 15px; border: 1px solid #333; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        .jtbp-panel { display: none !important; width: 100%; height: 100%; }
        .jtbp-panel.active { display: block !important; }
        
        .jtbp-local { padding: 15px; text-align: center; }
        
        /* DISEÑO VIP DEL RECEPTOR DE RADIO */
        .radio-card {
            background-color: #0a0a0a;
            border: 2px solid var(--primary);
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            margin: 20px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }
        .radio-icon { font-size: 50px; margin-bottom: 15px; color: var(--primary); }
        .radio-title { color: #fff; font-size: 20px; margin: 0 0 5px 0; }
        .radio-status { color: #ff4c4c; font-size: 12px; font-weight: bold; margin-bottom: 25px; letter-spacing: 1px; }
        audio { width: 100%; outline: none; border-radius: 30px; }
        
        iframe { width: 100%; height: 350px; border: none; display: block; }
    </style>
</head>
<body>

    <div class="header">
        <h1>JTBP PRODUCTIONS</h1>
        <p>📻 VERSIÓN 6 - RADIOS REALES 📻</p>
    </div>

    <div class="control-panel">
        <div class="panel-title">Seleccionar Fuente de Audio</div>
        <div class="channel-grid">
            <button class="channel-btn active" onclick="switchInput('canal-jtbp', this)">
                <span class="icon">🎙️</span> JTBP Orig.
            </button>
            <button class="channel-btn" onclick="switchInput('canal-youtube', this)">
                <span class="icon">📺</span> YouTube VIP
            </button>
            <button class="channel-btn" onclick="switchInput('canal-mixcloud', this)">
                <span class="icon">☁️</span> Mixcloud
            </button>
            <button class="channel-btn" onclick="switchInput('canal-spotify', this)">
                <span class="icon">🎧</span> Spotify*
            </button>
            <button class="channel-btn" onclick="switchInput('canal-jazz', this)">
                <span class="icon">🎷</span> Radio Jazz
            </button>
            <button class="channel-btn" onclick="switchInput('canal-salsa', this)">
                <span class="icon">🕺</span> Salsa Brava
            </button>
            <button class="channel-btn" onclick="switchInput('canal-retro', this)">
                <span class="icon">🪩</span> Retro 70s/80s
            </button>
        </div>
        <div style="font-size: 9px; color: var(--text-muted); text-align: center; margin-top: 10px;">
            * Spotify requiere cuenta Premium abierta en el navegador.
        </div>
    </div>

    <div class="player-stage">
        
        <div id="canal-jtbp" class="jtbp-panel active jtbp-local">
             <h3 style="color: var(--primary); margin-top: 50px;">Buscando tus episodios...</h3>
             <p style="color: var(--text-muted); font-size: 12px;">El motor JS está conectado.</p>
             </div>

        <div id="canal-youtube" class="jtbp-panel">
            <iframe src="https://www.youtube.com/embed/S_x8G7H0qI0?rel=0" title="Funk Mix" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>

        <div id="canal-mixcloud" class="jtbp-panel">
            <iframe src="https://www.mixcloud.com/widget/iframe/?hide_cover=1&feed=%2FNTSRadio%2Fmoxie-15th-september-2021%2F" frameborder="0"></iframe>
        </div>

        <div id="canal-spotify" class="jtbp-panel">
            <iframe src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe>
        </div>

        <div id="canal-jazz" class="jtbp-panel">
             <div class="radio-card">
                 <div class="radio-icon">🎷</div>
                 <h2 class="radio-title">Radio Swiss Jazz</h2>
                 <div class="radio-status">● EN VIVO</div>
                 <audio controls preload="none">
                     <source src="https://stream.srg-ssr.ch/m/rsj/mp3_128" type="audio/mpeg">
                     Tu navegador no soporta el audio.
                 </audio>
             </div>
        </div>

        <div id="canal-salsa" class="jtbp-panel">
             <div class="radio-card">
                 <div class="radio-icon">🕺</div>
                 <h2 class="radio-title">Salsa Brava Radio</h2>
                 <div class="radio-status">● EN VIVO</div>
                 <audio controls preload="none">
                     <source src="https://stream.zeno.fm/f3y77z27t18uv" type="audio/mpeg">
                     Tu navegador no soporta el audio.
                 </audio>
             </div>
        </div>

        <div id="canal-retro" class="jtbp-panel">
             <div class="radio-card">
                 <div class="radio-icon">🪩</div>
                 <h2 class="radio-title">Retro Hits 80s</h2>
                 <div class="radio-status">● EN VIVO</div>
                 <audio controls preload="none">
                     <source src="https://stream.srg-ssr.ch/m/rsc_de/mp3_128" type="audio/mpeg">
                     Tu navegador no soporta el audio.
                 </audio>
             </div>
        </div>

    </div>

    <script src="firebase.js"></script>
    <script src="app.js"></script>

    <script>
        // MOTOR DE CAMBIO DE CANALES
        function switchInput(inputId, btnElement) {
            
            // Pausar las radios automáticamente al cambiar de canal
            document.querySelectorAll('audio').forEach(function(audioElement) {
                audioElement.pause();
            });

            document.querySelectorAll('.jtbp-panel').forEach(function(el) {
                el.classList.remove('active');
            });
            document.querySelectorAll('.channel-btn').forEach(function(el) {
                el.classList.remove('active');
            });
            
            document.getElementById(inputId).classList.add('active');
            btnElement.classList.add('active');
        }
    </script>
</body>
</html>
