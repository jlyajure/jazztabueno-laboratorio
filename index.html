<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JTBP V3 - VERIFICACIÓN</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #151515;
            --primary: #d4af37;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #ff4c4c; padding-bottom: 10px; width: 100%; max-width: 500px; }
        .header h1 { color: var(--primary); margin: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        .header p { color: #ff4c4c; margin: 5px 0 0 0; font-weight: bold; font-size: 18px; } /* Texto rojo gigante para asegurar V3 */
        
        .control-panel {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #333;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
            width: 100%;
            max-width: 500px;
            margin-bottom: 25px;
        }
        .panel-title { color: var(--primary); font-size: 12px; font-weight: bold; text-align: center; margin-bottom: 10px; text-transform: uppercase; }
        
        .channel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .channel-btn:last-child { grid-column: span 3; }

        .channel-btn {
            background-color: #252525;
            color: var(--text-main);
            border: 1px solid #444;
            padding: 10px 5px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .channel-btn .icon { font-size: 16px; }
        .channel-btn.active { background-color: var(--primary); color: #000; border-color: var(--primary); }

        .player-stage { width: 100%; max-width: 500px; min-height: 400px; background-color: var(--card-bg); border-radius: 15px; border: 1px solid #333; overflow: hidden; }
        .player-content { display: none; width: 100%; height: 100%; }
        .player-content.active { display: block; }
        
        /* Estilos simulados para tus tarjetas de JTBP */
        .jtbp-local { padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .jtbp-card { background-color: #000; border: 1px solid #333; border-radius: 10px; padding: 15px; text-align: center; }
        .jtbp-card h4 { margin: 10px 0 5px; color: #fff; font-size: 16px; }
        .jtbp-tags { font-size: 10px; color: var(--primary); margin-bottom: 10px; }
        
        iframe { width: 100%; height: 400px; border: none; display: block; }
    </style>
</head>
<body>

    <div class="header">
        <h1>JTBP PRODUCTIONS</h1>
        <p>🚨 VERSIÓN 3 - CONFIRMACIÓN 🚨</p>
    </div>

    <div class="control-panel">
        <div class="panel-title">Seleccionar Fuente de Audio</div>
        <div class="channel-grid">
            <button class="channel-btn active" onclick="switchInput('jtbp')">
                <span class="icon">🎙️</span> JTBP Orig.
            </button>
            <button class="channel-btn" onclick="switchInput('youtube')">
                <span class="icon">📺</span> YouTube VIP
            </button>
            <button class="channel-btn" onclick="switchInput('mixcloud')">
                <span class="icon">☁️</span> Mixcloud
            </button>
            <button class="channel-btn" onclick="switchInput('spotify')">
                <span class="icon">🎧</span> Spotify*
            </button>
            <button class="channel-btn" onclick="switchInput('radio_jazz')">
                <span class="icon">🎷</span> Radio Jazz
            </button>
            <button class="channel-btn" onclick="switchInput('radio_salsa')">
                <span class="icon">🕺</span> Salsa Brava
            </button>
            <button class="channel-btn" onclick="switchInput('radio_retro')">
                <span class="icon">🪩</span> Retro 70/80/90s
            </button>
        </div>
        <div style="font-size: 9px; color: var(--text-muted); text-align: center; margin-top: 10px;">
            * Spotify requiere cuenta Premium abierta en el navegador.
        </div>
    </div>

    <div class="player-stage">
        
        <div id="jtbp" class="player-content active jtbp-local">
            <div class="jtbp-card">
                <div style="color: var(--primary); font-size: 40px;">🎷</div>
                <h4>Programa 3-2026 (Move On)</h4>
                <div class="jtbp-tags">#jazz #worldMusic #funk #nu-jazz #podcast</div>
            </div>
            <div class="jtbp-card">
                <div style="color: var(--primary); font-size: 40px;">🪩</div>
                <h4>Programa 3-2026 (I Just Might)</h4>
                <div class="jtbp-tags">#funk #pop #disco #nu-disco #podcast</div>
            </div>
            <script src="app.js"></script>
        </div>

        <div id="youtube" class="player-content">
            <iframe src="https://www.youtube.com/embed/jfKfPfyJRdk?autoplay=1" title="YouTube Lofi Jazz" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>

        <div id="mixcloud" class="player-content">
            <iframe src="https://www.mixcloud.com/widget/iframe/?hide_cover=1&feed=%2Fdj-jazzy-jeff%2F" frameborder="0"></iframe>
        </div>

        <div id="spotify" class="player-content">
            <iframe src="https://open.spotify.com/embed/playlist/37i9dQZF1DWVqfgj8NZEp1" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe>
        </div>

        <div id="radio_jazz" class="player-content">
             <iframe src="https://www.youtube.com/embed/dxigNqG-n0A?autoplay=1" title="Live Jazz Radio" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>

        <div id="radio_salsa" class="player-content">
             <iframe src="https://www.youtube.com/embed/8B1oP142pXg?autoplay=1" title="Salsa Radio" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>

        <div id="radio_retro" class="player-content">
             <iframe src="https://www.youtube.com/embed/zQfJMpeB_Jk?autoplay=1" title="Retro Radio" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>

    </div>

    <script>
        function switchInput(inputId) {
            document.querySelectorAll('.player-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.channel-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(inputId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
