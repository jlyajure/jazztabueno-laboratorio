    <script>
        window.castUrl = ""; window.castTitle = ""; window.castCover = ""; window.lastTvTime = 0;
        window['__onGCastApiAvailable'] = function(isAvailable) {
            if (isAvailable) {
                const castContext = cast.framework.CastContext.getInstance();
                castContext.setOptions({ 
                    receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID, 
                    autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED 
                });
                
                const player = new cast.framework.RemotePlayer();
                const controller = new cast.framework.RemotePlayerController(player);
                
                controller.addEventListener(cast.framework.RemotePlayerEventType.CURRENT_TIME_CHANGED, () => {
                    window.lastTvTime = player.currentTime;
                });

                castContext.addEventListener(cast.framework.CastContextEventType.SESSION_STATE_CHANGED, (event) => {
                    const media = document.getElementById('main-media');
                    if (event.sessionState === 'SESSION_STARTED') {
                        media.pause();
                        const session = castContext.getCurrentSession();
                        const info = new chrome.cast.media.MediaInfo(window.castUrl, 'audio/mp3');
                        const meta = new chrome.cast.media.MusicTrackMediaMetadata();
                        meta.title = window.castTitle; 
                        meta.artist = "Jazztabueno Productions";
                        meta.images = [new chrome.cast.Image(window.castCover)];
                        info.metadata = meta;
                        const req = new chrome.cast.media.LoadRequest(info);
                        req.currentTime = media.currentTime;
                        session.loadMedia(req);
                    }
                    if (event.sessionState === 'SESSION_ENDED') {
                        if (window.lastTvTime > 0) media.currentTime = window.lastTvTime;
                        setTimeout(() => { 
                            media.play().catch(()=>{}); 
                            if(window.actualizarUI) window.actualizarUI(); 
                        }, 500);
                    }
                });
            }
        };
    </script>

        // ✅ PROGRAMA 11 REPARADO (CORREGIDO URL)

        { año: 2020, categoria: "STUDIO 79", titulo: "Programa 4", url: "https://archive.org/download/studio-79-programa-4-2020/Studio%2079%20Programa%204-2020.mp3", plataforma: "archive" },
        { año: 2020, categoria: "STUDIO 79", titulo: "Programa 8", url: "https://archive.org/download/studio-79-programa-8-2020/Studio%2079%20Programa%208-2020.mp3", plataforma: "archive" }
    ];

    window.openVault = () => { document.getElementById('main-view').style.display = 'none'; document.getElementById('vault-view').style.display = 'block'; window.mostrarPorAño(2025, document.getElementById('btn-2025')); window.scrollTo({top:0, behavior:'smooth'}); };
    window.closeVault = () => { document.getElementById('vault-view').style.display = 'none'; document.getElementById('main-view').style.display = 'block'; document.getElementById('grid-archivos').innerHTML = ''; if(window.misReproductoresMixcloud) { window.misReproductoresMixcloud.forEach(item => { try { item.reproductor.pause(); } catch(e){} }); } window.misReproductoresMixcloud = []; document.querySelectorAll('.vintage-audio').forEach(a => { a.pause(); }); window.scrollTo({top:0, behavior:'smooth'}); };

    window.mostrarPorAño = (año, botonApretado) => {
        const botones = document.querySelectorAll('.year-btn'); botones.forEach(b => b.classList.remove('activo')); if(botonApretado) botonApretado.classList.add('activo');
        const grid = document.getElementById('grid-archivos'); window.misReproductoresMixcloud = []; const filtrados = window.MIS_ARCHIVOS_BOVEDA.filter(item => item.año === año);
        if (filtrados.length === 0) { grid.innerHTML = `<p style="color:#D4AF37; text-align: center; font-size:12px;">Puliendo diamantes...</p>`; return; }
        let contenidoHtml = ""; const categoriasUnicas = [...new Set(filtrados.map(item => item.categoria))];
        let idCounter = 0;
        categoriasUnicas.forEach(cat => {
            contenidoHtml += `<div class="categoria-titulo-vault">► ${cat}</div>`;
            filtrados.filter(item => item.categoria === cat).forEach(item => {
                const esEspecial = item.titulo.toLowerCase().includes('especial');
                const clase = esEspecial ? 'card-especial-v' : 'card-regular-v';
                if (item.plataforma === 'archive') {
                    let cover = "https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png";
                    if(item.categoria.toUpperCase().includes("STUDIO")) cover = "https://i.postimg.cc/NKMDbYJB/S79.png";
                    contenidoHtml += `
                    <div class="vintage-player ${clase}" id="vp-card-${idCounter}">
                        <img src="${cover}" class="vp-cover" onerror="this.src='https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png'">
                        <div class="vp-info">
                            <div class="vp-title">${item.titulo}</div>
                            <div class="vp-controls">
                                <button class="vp-btn" id="vp-btn-${idCounter}" onclick="toggleVintage('vp-audio-${idCounter}', 'vp-btn-${idCounter}', 'vp-card-${idCounter}')">${SVG_PLAY}</button>
                                <input type="range" class="vp-slider" id="vp-slider-${idCounter}" value="0" min="0" step="1" oninput="seekVintage('vp-audio-${idCounter}', this.value)">
                                <span class="vp-time" id="vp-time-${idCounter}">00:00</span>
                            </div>
                        </div>
                        <audio id="vp-audio-${idCounter}" class="vintage-audio" src="${item.url}" ontimeupdate="updateVintageTime('vp-audio-${idCounter}', 'vp-slider-${idCounter}', 'vp-time-${idCounter}')" onended="resetVintage('vp-btn-${idCounter}', 'vp-card-${idCounter}')"></audio>
                    </div>`;
                } else {
                    contenidoHtml += `<div class="mix-card-v ${clase}"><iframe id="mix-iframe-${idCounter}" width="100%" height="60" src="${item.url}" frameborder="0" style="margin-top: -2px;"></iframe></div>`;
                }
                idCounter++;
            });
        });
        grid.innerHTML = contenidoHtml;
    };

    window.toggleVintage = (audioId, btnId, cardId) => {
        const audio = document.getElementById(audioId); const btn = document.getElementById(btnId); const card = document.getElementById(cardId); const mainMedia = document.getElementById('main-media');
        if(mainMedia && !mainMedia.paused) { mainMedia.pause(); if(window.actualizarUI) window.actualizarUI(); }
        if (audio.paused) {
            document.querySelectorAll('.vintage-audio').forEach(a => { if(a.id !== audioId) { a.pause(); document.getElementById(a.id.replace('audio', 'btn')).innerHTML = SVG_PLAY; } });
            document.querySelectorAll('.vintage-player').forEach(c => c.classList.remove('playing'));
            audio.play(); btn.innerHTML = SVG_PAUSE; card.classList.add('playing');
        } else {
            audio.pause(); btn.innerHTML = SVG_PLAY; card.classList.remove('playing');
        }
    };
    window.updateVintageTime = (audioId, sliderId, timeId) => { const audio = document.getElementById(audioId); const slider = document.getElementById(sliderId); const time = document.getElementById(timeId); if(!isNaN(audio.duration)) { slider.max = audio.duration; slider.value = audio.currentTime; const m = Math.floor(audio.currentTime / 60), s = Math.floor(audio.currentTime % 60); time.innerText = `${m}:${s < 10 ? '0' : ''}${s}`; } };
    window.seekVintage = (audioId, val) => { document.getElementById(audioId).currentTime = val; };
    window.resetVintage = (btnId, cardId) => { document.getElementById(btnId).innerHTML = SVG_PLAY; document.getElementById(cardId).classList.remove('playing'); };
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { initializeFirestore, collection, query, orderBy, onSnapshot, addDoc, deleteDoc, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyBwBq4gLgv4DSfUidzUuC7Irmvj_4pCTtI", authDomain: "familia-yajure-app.firebaseapp.com", projectId: "familia-yajure-app", storageBucket: "familia-yajure-app.firebasestorage.app", messagingSenderId: "692035727386", appId: "1:692035727386:web:dfa3e39a481d56368a61a3", measurementId: "G-GDBL4HPE79" };
    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, { experimentalForceLongPolling: true });
    
    const media = document.getElementById('main-media');
    const seekBar = document.getElementById('seek-bar');
    let programas = []; let currentRenderedList = []; let idActual = null; let filtro = 'Todo'; let hashtagFiltro = ''; let isAdmin = false;

    window.actualizarUI = () => { render(); }; 
    if(localStorage.getItem('jtp_auth') === 'ok') { isAdmin = true; document.getElementById('btn-salir').style.display = 'block'; }
    window.doLogout = () => { localStorage.removeItem('jtp_auth'); location.reload(); };

    let taps = 0, lastTap = 0;
    document.getElementById('admin-trigger').onclick = () => {
        const now = new Date().getTime(); if(now - lastTap > 1000) taps = 0; lastTap = now; taps++;
        if(taps === 3) {
            if(!isAdmin) {
                const pass = prompt("🔐 DIRECTOR: Ingrese Clave de Cabina:");
                if(pass === "ticoadmin2026") { localStorage.setItem('jtp_auth', 'ok'); isAdmin = true; document.getElementById('admin-panel').style.display = 'block'; document.getElementById('btn-salir').style.display = 'block'; render(); }
            } else { document.getElementById('admin-panel').style.display = 'block'; }
            taps = 0;
        }
    };
    
    window.setFilter = (cat, el) => { filtro = cat; document.querySelectorAll('.ch-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); render(); };
    window.doLike = async (id, el) => {
        if(localStorage.getItem('jtp_like_' + id) === 'true') return;
        localStorage.setItem('jtp_like_' + id, 'true'); el.classList.add('liked');
        try { await updateDoc(doc(db, "radio_programas", id), { likes: increment(1) }); } catch(e) {}
    };

    window.toggleComments = (id) => { const s = document.getElementById(`comments-${id}`); s.style.display = s.style.display === 'block' ? 'none' : 'block'; if(s.style.display === 'block') window.cargarComentarios(id); };
    window.cargarComentarios = (id) => { const l = document.getElementById(`clist-${id}`); onSnapshot(query(collection(db, "radio_programas", id, "comentarios"), orderBy("fecha", "asc")), (snap) => { l.innerHTML = ""; snap.forEach(d => { const c = d.data(); const div = document.createElement('div'); div.className = 'c-item'; div.innerHTML = `<div class="c-user">${c.usuario}</div><div class="c-msg">${c.mensaje}</div>`; l.appendChild(div); }); }); };
    window.enviarComentario = async (id) => { const u = document.getElementById(`cuser-${id}`).value, m = document.getElementById(`cmsg-${id}`).value; if(!u || !m) return; try { await addDoc(collection(db, "radio_programas", id, "comentarios"), { usuario: u, mensaje: m, fecha: new Date().getTime() }); document.getElementById(`cmsg-${id}`).value = ""; } catch(e) {} };

    onSnapshot(query(collection(db, "radio_programas"), orderBy("fecha", "desc")), (snap) => { programas = []; snap.forEach(d => programas.push({id: d.id, ...d.data()})); render(); });

    window.playItem = (id, url, tit, img) => {
        if(idActual === id) { window.doToggle(); } else {
            idActual = id; media.src = url; media.play();
            document.getElementById('p-title').innerText = tit;
            document.getElementById('p-vinyl').style.backgroundImage = `url('${img}')`;
            document.getElementById('global-player').style.display = 'block';
        }
        render();
    };

    window.doToggle = () => { if(media.paused) media.play(); else media.pause(); render(); };
    window.doClose = () => { media.pause(); document.getElementById('global-player').style.display='none'; idActual=null; render(); };
    window.toggleList = (id) => { const el = document.getElementById(`list-${id}`); el.style.display = (el.style.display === 'block') ? 'none' : 'block'; };

    function render() {
        const feed = document.getElementById('feed'); if(!feed) return; feed.innerHTML = "";
        const list = programas.filter(p => (filtro === 'Todo' || (p.programa||"").toUpperCase().includes(filtro.toUpperCase())));
        list.forEach(p => {
            const isPlaying = idActual === p.id && !media.paused;
            const div = document.createElement('div'); div.className = `card ${isPlaying ? 'playing' : ''}`;
            div.innerHTML = `
                <div class="card-cover" style="background-image: url('${p.imagenUrl}')">
                    <div class="card-overlay"><button class="btn-play" onclick="window.playItem('${p.id}','${p.mp3Url}','${p.titulo}','${p.imagenUrl}')">${isPlaying ? SVG_PAUSE : SVG_PLAY}</button></div>
                </div>
                <div class="info">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="color:var(--gold); font-size:9px; font-weight:900;">${p.programa}</span>
                        <div class="contador-oyentes">🎧 <span>${p.reproducciones || 0}</span></div>
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:start; margin-top:8px;">
                        <h3 class="ep-title">${p.titulo}</h3>
                        <button class="btn-like" onclick="window.doLike('${p.id}', this)">🤍 <span class="like-count">${p.likes || 0}</span></button>
                    </div>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-list" style="flex:1" onclick="window.toggleList('${p.id}')">📋 INFO</button>
                        <button class="btn-list" style="flex:1" onclick="window.toggleComments('${p.id}')">💬 CHAT</button>
                    </div>
                    <div id="list-${p.id}" class="list-box">${p.playlist || "Próximamente."}</div>
                    <div id="comments-${p.id}" class="comments-section">
                        <div id="clist-${p.id}" class="c-list"></div>
                        <input type="text" id="cuser-${p.id}" class="c-input" placeholder="Nombre">
                        <textarea id="cmsg-${p.id}" class="c-input" placeholder="Mensaje"></textarea>
                        <button class="c-btn" onclick="window.enviarComentario('${p.id}')">ENVIAR</button>
                    </div>
                </div>`;
            feed.appendChild(div);
        });
        const pBtn = document.getElementById('p-play-btn'); if(pBtn) pBtn.innerHTML = media.paused ? SVG_PLAY : SVG_PAUSE;
    }

    media.ontimeupdate = () => { 
        seekBar.value = media.currentTime; 
        const m = Math.floor(media.currentTime/60), s = Math.floor(media.currentTime%60);
        const dm = isNaN(media.duration) ? 0 : Math.floor(media.duration/60);
        const ds = isNaN(media.duration) ? 0 : Math.floor(media.duration%60);
        document.getElementById('p-time').innerText = `${m}:${s<10?'0':''}${s} / ${dm}:${ds<10?'0':''}${ds}`;
    };
    media.onloadedmetadata = () => { if(!isNaN(media.duration)) seekBar.max = media.duration; };
    seekBar.oninput = () => { media.currentTime = seekBar.value; };
</script>
</body>
