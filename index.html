<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JazzTaBueno - Bóveda V4.2</title>
    
    <script src="https://widget.mixcloud.com/media/js/widgetApi.js"></script>
    
    <style>
        /* ESTILOS DE GALA */
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
        .home-section { display: flex; justify-content: center; align-items: center; gap: 15px; padding: 20px; flex-wrap: wrap; }
        .promo-img { width: 80px; border-radius: 5px; border: 1px solid #333; }

        /* LA BÓVEDA */
        .jtbp-vault-bg { background: radial-gradient(circle, #222 10%, transparent 11%), #111; background-size: 10px 10px; border-top: 3px solid #D4AF37; padding: 40px 10px; text-align: center; }
        .baul-trigger { cursor: pointer; transition: transform 0.3s; margin-bottom: 20px; display: inline-block; }
        .baul-trigger:active { transform: scale(0.95); }
        .img-baul-final { width: 90px; border-radius: 12px; border: 2px solid #D4AF37; box-shadow: 0 0 20px #0070f3; }
        .gold-text { color: #D4AF37; text-transform: uppercase; letter-spacing: 2px; margin-top: 15px; font-size: 14px;}

        /* AVISO DE GALA Y LEYENDA */
        .alerta-gala { 
            color: #0070f3; font-size: 12px; margin-bottom: 20px; max-width: 550px; 
            margin-left: auto; margin-right: auto; line-height: 1.6; text-align: center;
            background: rgba(0, 0, 0, 0.5); padding: 10px; border-radius: 8px; border: 1px solid #333;
        }
        .alerta-gala strong { color: #D4AF37; }

        /* LÍNEA DE TIEMPO Y BOTONES ILUMINADOS */
        .timeline-swipe { display: flex; overflow-x: auto; gap: 15px; padding: 10px; justify-content: center; border-bottom: 1px solid #0070f3; margin-bottom: 20px; padding-bottom: 20px; }
        .year-btn { background: none; border: 1px solid #D4AF37; color: #D4AF37; padding: 6px 15px; border-radius: 20px; cursor: pointer; font-size: 12px; transition: 0.3s; }
        .year-btn.activo { background: #D4AF37; color: #000; font-weight: bold; box-shadow: 0 0 10px #D4AF37; }

        /* REJILLA Y SEPARADORES */
        .grid-2x2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 600px; margin: 0 auto; text-align: left; }
        .categoria-titulo { grid-column: 1 / -1; color: #0070f3; border-bottom: 1px solid #333; margin-top: 15px; padding-bottom: 5px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* GUILLOTINA PARA EL BOTÓN FOLLOW */
        .mix-card { background: #000; border-radius: 5px; overflow: hidden; height: 55px; }
        .card-especial { border: 2px solid #D4AF37; box-shadow: 0 0 10px #D4AF37; }
        .card-regular { border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="home-section">
        <img src="promo_jazz.jpg" class="promo-img" alt="Jazz">
        <img src="promo_rock.jpg" class="promo-img" alt="Rock">
        <img src="promo_salsa.jpg" class="promo-img" alt="Salsa">
        <img src="promo_studio.jpg" class="promo-img" alt="Studio">
    </div>

    <section class="jtbp-vault-bg">
        <div class="baul-trigger" onclick="abrirCerrarBaul()">
            <img src="baul.png" class="img-baul-final" alt="Baúl">
            <h2 class="gold-text">ABRIR BÓVEDA DEL LEGADO</h2>
        </div>

        <div id="contenido-baul" style="display:none;">
            
            <div class="alerta-gala">
                <i>⚠️ <strong>Aviso:</strong> Para escuchar, presiona únicamente el botón de <strong>▶ PLAY</strong>.</i><br>
                <i>⭐ <strong>Nota:</strong> Los programas con marco iluminado son <strong>Ediciones Especiales</strong>.</i>
            </div>

            <div class="timeline-swipe">
                <button class="year-btn" id="btn-2025" onclick="mostrarPorAño(2025, this)">2025</button>
                <button class="year-btn" onclick="mostrarPorAño(2023, this)">2023</button>
                <button class="year-btn" onclick="mostrarPorAño(2022, this)">2022</button>
            </div>
            <div id="grid-archivos" class="grid-2x2"></div>
        </div>
    </section>

    <script>
        const MIS_ARCHIVOS = [
            { año: 2025, categoria: "Studio 79", titulo: "Especial Studio Mix Two", url: "https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=%2FStudio79%2Fstudio79-192025-especial-studio-mix-two%2F" },
            { año: 2025, categoria: "Studio 79", titulo: "Funky Fever", url: "https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=%2FStudio79%2Fstudio79-182025-funky-fever%2F" },
            { año: 2025, categoria: "Studio 79", titulo: "Disco Nights", url: "https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=%2FStudio79%2Fstudio79-122025-disco-nights%2F" },
            { año: 2025, categoria: "Jazz Ta Bueno", titulo: "Seductive Soul", url: "https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=%2FJazzTaBueno%2Fjazztabueno-042025-seductive-soul%2F" },
            { año: 2025, categoria: "Salsa Brava", titulo: "Traigo Salsa", url: "https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=%2FByJTB%2Fsalsabrava-072025-traigo-salsa%2F" },
            { año: 2025, categoria: "Salsa Brava", titulo: "Salsa 1983", url: "https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=%2FByJTB%2Fsalsabrava-062025-1983%2F" },
            { año: 2023, categoria: "Old School Rock", titulo: "Slight Return", url: "https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=%2Foldschoolradio%2Fold-school-rock-radio-012023-slight-return%2F" },
            { año: 2023, categoria: "Old School Rock", titulo: "Bionic Grass", url: "https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=%2Foldschoolradio%2Fold-school-rock-radio-052023-bionic-grass%2F" },
            { año: 2022, categoria: "Jazz Ta Bueno", titulo: "Get Lucky", url: "https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=%2FJazzTaBueno%2Fjazztabueno-342022-get-lucky%2F" }
        ];

        let reproductoresActivos = [];

        function abrirCerrarBaul() {
            const display = document.getElementById('contenido-baul');
            if(display.style.display === 'none') {
                display.style.display = 'block';
                mostrarPorAño(2025, document.getElementById('btn-2025')); 
            } else {
                display.style.display = 'none';
                document.getElementById('grid-archivos').innerHTML = ''; 
                reproductoresActivos = []; 
            }
        }

        function mostrarPorAño(año, botonApretado) {
            const botones = document.querySelectorAll('.year-btn');
            botones.forEach(b => b.classList.remove('activo'));
            if(botonApretado) botonApretado.classList.add('activo');

            const grid = document.getElementById('grid-archivos');
            reproductoresActivos = []; 
            
            const filtrados = MIS_ARCHIVOS.filter(item => item.año === año);

            if (filtrados.length === 0) {
                grid.innerHTML = `<p style="color:#D4AF37; grid-column: 1/3; text-align: center;">Puliendo diamantes para ${año}...</p>`;
                return;
            }

            let contenidoHtml = "";
            const categoriasUnicas = [...new Set(filtrados.map(item => item.categoria))];
            let idCounter = 0;

            categoriasUnicas.forEach(cat => {
                contenidoHtml += `<div class="categoria-titulo">► ${cat}</div>`;
                
                const programasDeCat = filtrados.filter(item => item.categoria === cat);
                programasDeCat.forEach(item => {
                    const esEspecial = item.titulo.toLowerCase().includes('especial');
                    const clase = esEspecial ? 'card-especial' : 'card-regular';
                    
                    contenidoHtml += `
                        <div class="mix-card ${clase}">
                            <iframe id="mix-iframe-${idCounter}" width="100%" height="60" src="${item.url}" frameborder="0" style="margin-top: -2px;"></iframe>
                        </div>`;
                    idCounter++;
                });
            });

            grid.innerHTML = contenidoHtml;

            // EL NUEVO CEREBRO: Esperamos a que cada uno avise que despertó
            const iframes = document.querySelectorAll('.mix-card iframe');
            iframes.forEach(iframe => {
                try {
                    const widget = Mixcloud.PlayerWidget(iframe);
                    reproductoresActivos.push(widget);
                    
                    // La promesa '.ready' es el truco para domarlos
                    widget.ready.then(function() {
                        widget.bind('play', function() {
                            reproductoresActivos.forEach(w => {
                                if (w !== widget) {
                                    w.pause();
                                }
                            });
                        });
                    });
                } catch (error) {
                    console.log("Esperando conexión Mixcloud...", error);
                }
            });
        }
    </script>
</body>
</html>
