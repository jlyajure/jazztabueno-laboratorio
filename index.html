<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jazztabueno</title>
    
    <link rel="icon" type="image/png" href="https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png">
    <meta name="theme-color" content="#050505">
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="Jazztabueno Productions">
    <meta property="og:description" content="Escucha nuestros programas exclusivos de Radio.">
    <meta property="og:image" itemprop="image" content="https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png">
    <meta property="og:site_name" content="Jazztabueno Productions">

    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://widget.mixcloud.com/media/js/widgetApi.js"></script>
    
    <script>
        window.castUrl = ""; window.castTitle = ""; window.castCover = "";
        window['__onGCastApiAvailable'] = function(isAvailable) {
            if (isAvailable) {
                const castContext = cast.framework.CastContext.getInstance();
                castContext.setOptions({ 
                    receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID, 
                    autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED 
                });
            }
        };
    </script>
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>

    <style>
        :root { --gold: #a68a44; --bg: #050505; --card: #121212; --red: #ff4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: var(--bg); color: #ffffff; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

        header { background: rgba(0,0,0,0.98); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .brand-title { color: var(--gold); font-family: 'Playfair Display', serif; font-size: 14px; text-transform: uppercase; line-height: 1.2; letter-spacing: 0.5px; }
        
        .btn-boveda-container { display: flex; align-items: center; gap: 8px; cursor: pointer; background: rgba(212, 175, 55, 0.1); padding: 5px 10px; border-radius: 12px; border: 1px solid var(--gold); }
        .btn-boveda-header { width: 38px; height: 38px; border-radius: 6px; object-fit: cover; }
        .btn-boveda-text { color: var(--gold); font-size: 9px; font-weight: 900; text-transform: uppercase; line-height: 1.1; text-align: right; }

        #btn-volver-header { background: #111; border: 1px solid var(--gold); color: var(--gold); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 11px; display: none; }
        .btn-salir { background: transparent; border: 2px solid var(--gold); color: var(--gold); padding: 7px 15px; border-radius: 8px; font-size: 10px; font-weight: 900; cursor: pointer; }

        .container { max-width: 450px; margin: auto; padding: 15px; padding-bottom: 250px; }
        .channels-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 25px; padding: 10px 0; }
        .ch-item { display: flex; flex-direction: column; align-items: center; text-align: center; opacity: 0.7; cursor: pointer; }
        .ch-item.active { opacity: 1; }
        .ch-logo { width: 44px; height: 44px; border-radius: 12px; border: 2px solid #222; margin-bottom: 6px; background: #000; object-fit: contain; }
        .active .ch-logo { border-color: var(--gold); }
        .ch-name { font-size: 6px; color: #ffffff; font-weight: 800; text-transform: uppercase; }

        .card { background: var(--card); border-radius: 20px; margin-bottom: 30px; border: 1px solid #1a1a1a; overflow: hidden; }
        .card.playing { border-color: var(--gold); }
        .card-cover { width: 100%; height: 180px; background-size: cover; background-position: center; position: relative; }
        .card-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); }
        
        /* CORRECCIÓN: FLECHA PLAY NEGRA */
        .btn-play { background-color: var(--gold); border: none; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-play svg { width: 28px; height: 28px; fill: #000 !important; }
        
        .info { padding: 20px; }
        .ep-title { margin: 8px 0 4px 0; font-size: 19px; font-weight: 800; }
        .btn-list { background: #1a1a1a; border: 1.5px solid #333; color: #ffffff; padding: 12px; border-radius: 12px; font-size: 11px; font-weight: 800; width: 100%; cursor: pointer; margin-top:12px; }

        .jtbp-vault-bg { background: #111; padding: 20px 10px; border-radius: 20px; border: 1px solid #1a1a1a; margin-bottom: 30px; text-align: center; }
        .timeline-swipe { display: flex; overflow-x: auto; gap: 12px; padding: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--gold); }
        .year-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 6px 18px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: bold; flex-shrink: 0; }
        .year-btn.activo { background: var(--gold); color: #000; }

        .vault-card { background: #000; border-radius: 15px; padding: 15px; border: 1px solid #333; margin-bottom: 15px; text-align: left; }
        .vintage-player { background: #111; border-radius: 8px; display: flex; align-items: center; padding: 10px; gap: 12px; border-left: 4px solid var(--gold); margin-top: 10px; }
        .vp-cover { width: 50px; height: 50px; border-radius: 6px; }
        .vp-btn { background: var(--gold); border: none; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .vp-btn svg { width: 16px; height: 16px; fill: #000 !important; }

        #global-player { position: fixed; bottom: 0; left: 0; width: 100%; background: #080808; border-top: 3px solid var(--gold); padding: 15px 20px; display: none; z-index: 1000; }
        .p-vinyl { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--gold); background-size: cover; animation: rot 4s linear infinite; animation-play-state: paused; }
        .playing .p-vinyl { animation-play-state: running; }
        @keyframes rot { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        #seek-bar { width: 100%; margin: 10px 0; -webkit-appearance: none; background: #333; height: 4px; border-radius: 2px; }
        #seek-bar::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--gold); border-radius: 50%; }

        #pantalla-salida { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#050505; z-index:99999; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; }
    </style>
</head>
<body>

<div id="app-content">
    <header>
        <div style="display:flex; align-items:center; gap:12px; cursor:pointer;" onclick="window.triggerAdmin()">
            <img src="https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png" width="35" height="35">
            <div class="brand-title">JAZZTABUENO<br>PRODUCTIONS</div>
        </div>
        <div style="display:flex; align-items:center; gap:12px;">
            <div id="btn-boveda-header" class="btn-boveda-container" onclick="window.openVault()">
                <div class="btn-boveda-text">BÓVEDA DEL<br>LEGADO</div>
                <img src="https://i.postimg.cc/8P6m3YmB/baul.png" onerror="this.src='https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png'" class="btn-boveda-header">
            </div>
            <button id="btn-volver-header" onclick="window.closeVault()">⬅ VOLVER</button>
            <button onclick="window.confirmarSalida()" class="btn-salir" id="btn-salir">SALIR</button>
        </div>
    </header>

    <div id="main-view" class="container">
        <div id="admin-panel" style="display:none; background:#111; padding:20px; border-radius:20px; border:1px solid var(--gold); margin-bottom:20px;">
            <input type="text" id="t-titulo" style="width:100%; padding:10px; background:#000; color:white; border:1px solid #333; margin-bottom:10px;" placeholder="Título">
            <input type="text" id="t-url" style="width:100%; padding:10px; background:#000; color:white; border:1px solid #333; margin-bottom:10px;" placeholder="URL MP3">
            <button id="btn-save" style="width:100%; background:var(--gold); padding:10px; border:none; font-weight:bold;">💾 GUARDAR</button>
        </div>

        <div class="channels-grid">
            <div class="ch-item active" onclick="window.setFilter('Todo', this)"><img src="https://i.postimg.cc/8c7Smws4/logos-programas-jtbp.jpg" class="ch-logo"><span class="ch-name">Todo</span></div>
            <div class="ch-item" onclick="window.setFilter('JAZZTABUENO', this)"><img src="https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png" class="ch-logo"><span class="ch-name">Jazz</span></div>
            <div class="ch-item" onclick="window.setFilter('STUDIO 79', this)"><img src="https://i.postimg.cc/NKMDbYJB/S79.png" class="ch-logo"><span class="ch-name">Studio 79</span></div>
            <div class="ch-item" onclick="window.setFilter('SALSA BRAVA', this)"><img src="https://i.postimg.cc/75fchgyt/Salsa-Brava.png" class="ch-logo"><span class="ch-name">Salsa</span></div>
            <div class="ch-item" onclick="window.setFilter('OLD SCHOOL RADIO', this)"><img src="https://i.postimg.cc/jwQ3mczC/Old-School-Radio.png" class="ch-logo"><span class="ch-name">Old School</span></div>
        </div>
        <div id="feed"></div>
    </div>
    
    <div id="vault-view" class="container" style="display:none;">
        <section class="jtbp-vault-bg">
            <h2 style="color:var(--gold); font-size:14px; text-transform:uppercase;">Bóveda del Legado</h2>
            <div class="timeline-swipe">
                <button class="year-btn" id="btn-2025" onclick="window.mostrarPorAño(2025, this)">2025</button>
                <button class="year-btn" onclick="window.mostrarPorAño(2024, this)">2024</button>
                <button class="year-btn" onclick="window.mostrarPorAño(2023, this)">2023</button>
                <button class="year-btn" onclick="window.mostrarPorAño(2022, this)">2022</button>
                <button class="year-btn" onclick="window.mostrarPorAño(2021, this)">2021</button>
                <button class="year-btn" onclick="window.mostrarPorAño(2020, this)">2020</button>
            </div>
            <div id="grid-archivos" class="grid-vault"></div>
        </section>
    </div>
</div>

<div id="global-player">
    <audio id="main-media" playsinline webkit-playsinline></audio>
    <div style="display:flex; align-items:center; gap:15px;">
        <div id="p-vinyl" class="p-vinyl"></div>
        <div style="flex:1; overflow:hidden;">
            <h4 id="p-title" style="margin:0; font-size:14px; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">...</h4>
            <div id="p-time" style="font-size:11px; color:var(--gold);">00:00 / 00:00</div>
        </div>
        <button onclick="window.doToggle()" id="p-play-btn" style="background:none; border:none; cursor:pointer;"></button>
        <button onclick="window.doClose()" style="background:none; border:none; color:#666; font-size:24px;">×</button>
    </div>
    <canvas id="visualizador"></canvas>
    <input type="range" id="seek-bar" value="0" min="0" step="1">
</div>

<div id="pantalla-salida">
    <img src="https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png" width="120">
    <h2 style="color:white; margin-top:20px;">Música Detenida</h2>
    <p style="color:var(--gold);">Gracias por escuchar Jazztabueno</p>
    <button onclick="location.reload()" style="margin-top:30px; background:var(--gold); padding:12px 25px; border-radius:30px; border:none; font-weight:bold; cursor:pointer;">VOLVER A LA APP</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, addDoc, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyBwBq4gLgv4DSfUidzUuC7Irmvj_4pCTtI", authDomain: "familia-yajure-app.firebaseapp.com", projectId: "familia-yajure-app", storageBucket: "familia-yajure-app.firebasestorage.app", messagingSenderId: "692035727386", appId: "1:692035727386:web:dfa3e39a481d56368a61a3" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const media = document.getElementById('main-media');
    const seekBar = document.getElementById('seek-bar');
    let programas = []; let idActual = null; let filtro = 'Todo';

    const SVG_PLAY = `<svg viewBox="0 0 24 24" width="30"><path d="M8 5v14l11-7z" fill="black"/></svg>`;
    const SVG_PAUSE = `<svg viewBox="0 0 24 24" width="30"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" fill="black"/></svg>`;

    // 🔥 DATA DE LA BÓVEDA 🔥
    window.MIS_ARCHIVOS_BOVEDA = [
        { año: 2025, categoria: "Studio 79", titulo: "Especial Studio Mix Two", url: "https://archive.org/download/studio-79-13-2025-especial-studio-mix-one/Studio79%20-%2019_2025%20_ESPECIAL%20STUDIO%20MIX%20TWO_.mp3" },
        { año: 2025, categoria: "Studio 79", titulo: "Especial Studio Mix One", url: "https://archive.org/download/studio-79-13-2025-especial-studio-mix-one/Studio79%20-%2013_2025%20_ESPECIAL%20STUDIO%20MIX%20ONE_.mp3" },
        { año: 2025, categoria: "Studio 79", titulo: "Rhythm & Blues", url: "https://archive.org/download/programa-11-rhythm-blues/Programa%2011%20%28Rhythm%20%26%20Blues%29.mp3" },
        { año: 2024, categoria: "STUDIO 79", titulo: "Programa 5 Clásico", url: "https://archive.org/download/studio-79-programa-5/Studio%2079%20Programa%205.mp3" },
        { año: 2022, categoria: "JAZZTABUENO", titulo: "Programa 1", url: "https://archive.org/download/jazztabueno-programa-1-2022/Jazztabueno%20Programa%201-2022.mp3" },
        { año: 2021, categoria: "SALSA BRAVA", titulo: "Programa 1", url: "https://archive.org/download/salsa-brava-programa-1-2021/Salsa%20Brava%20Programa%201-2021.mp3" },
        { año: 2020, categoria: "STUDIO 79", titulo: "Programa 4", url: "https://archive.org/download/studio-79-programa-4-2020/Studio%2079%20Programa%204-2020.mp3" }
    ];

    window.openVault = () => {
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('vault-view').style.display = 'block';
        document.getElementById('btn-boveda-header').style.display = 'none';
        document.getElementById('btn-volver-header').style.display = 'block';
        window.mostrarPorAño(2025, document.getElementById('btn-2025'));
    };

    window.closeVault = () => {
        document.getElementById('vault-view').style.display = 'none';
        document.getElementById('main-view').style.display = 'block';
        document.getElementById('btn-volver-header').style.display = 'none';
        document.getElementById('btn-boveda-header').style.display = 'flex';
        document.querySelectorAll('.vintage-audio').forEach(a => a.pause());
    };

    window.mostrarPorAño = (año, btn) => {
        document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('activo'));
        if(btn) btn.classList.add('activo');
        const grid = document.getElementById('grid-archivos');
        const filtrados = window.MIS_ARCHIVOS_BOVEDA.filter(i => i.año === año);
        grid.innerHTML = filtrados.map((item, idx) => `
            <div class="vault-card">
                <span style="color:var(--gold); font-size:9px; font-weight:bold;">${item.categoria}</span>
                <h3 style="margin:5px 0; font-size:14px;">${item.titulo}</h3>
                <div class="vintage-player">
                    <img src="https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png" class="vp-cover">
                    <button class="vp-btn" onclick="window.playVault('${item.url}', '${item.titulo}', this)">${SVG_PLAY}</button>
                    <span style="font-size:10px; color:var(--gold);">Reproductor Legacy</span>
                </div>
            </div>
        `).join('');
    };

    window.playVault = (url, tit, btn) => {
        media.pause();
        media.removeAttribute('crossorigin');
        media.src = url;
        media.load();
        media.play();
        document.getElementById('p-title').innerText = tit;
        document.getElementById('global-player').style.display = 'block';
        render();
    };

    window.playItem = async (id, url, tit, img) => {
        if(idActual === id) { window.doToggle(); } 
        else {
            idActual = id;
            media.pause();
            media.removeAttribute('crossorigin');
            media.src = url;
            media.load();
            document.getElementById('p-title').innerText = tit;
            document.getElementById('p-vinyl').style.backgroundImage = `url('${img}')`;
            document.getElementById('global-player').style.display = 'block';
            try { await media.play(); } catch(e) {}
        }
        render();
    };

    window.doToggle = () => { if(media.paused) media.play(); else media.pause(); render(); };
    window.doClose = () => { media.pause(); document.getElementById('global-player').style.display='none'; idActual=null; render(); };
    window.confirmarSalida = () => { if(confirm("¿Salir?")) { media.pause(); document.getElementById('pantalla-salida').style.display='flex'; } };
    window.setFilter = (cat, el) => { filtro = cat; document.querySelectorAll('.ch-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); render(); };

    onSnapshot(query(collection(db, "radio_programas"), orderBy("fecha", "desc")), (snap) => {
        programas = []; snap.forEach(d => programas.push({id: d.id, ...d.data()}));
        render();
    });

    function render() {
        const feed = document.getElementById('feed'); if(!feed) return; feed.innerHTML = "";
        const filtered = (filtro === 'Todo') ? programas : programas.filter(p => p.programa === filtro);
        filtered.forEach(p => {
            const isPlaying = idActual === p.id && !media.paused;
            const div = document.createElement('div'); div.className = `card ${isPlaying ? 'playing' : ''}`;
            div.innerHTML = `
                <div class="card-cover" style="background-image: url('${p.imagenUrl}')">
                    <div class="card-overlay"><button class="btn-play" onclick="window.playItem('${p.id}','${p.mp3Url}','${p.titulo}','${p.imagenUrl}')">${isPlaying ? SVG_PAUSE : SVG_PLAY}</button></div>
                </div>
                <div class="info">
                    <span style="color:var(--gold); font-size:9px; font-weight:900;">${p.programa}</span>
                    <h3 class="ep-title">${p.titulo}</h3>
                    <button class="btn-list" onclick="window.playItem('${p.id}','${p.mp3Url}','${p.titulo}','${p.imagenUrl}')">ESCUCHAR PROGRAMA</button>
                </div>`;
            feed.appendChild(div);
        });
        document.getElementById('p-play-btn').innerHTML = media.paused ? SVG_PLAY : SVG_PAUSE;
        if(!media.paused) document.getElementById('global-player').classList.add('playing'); else document.getElementById('global-player').classList.remove('playing');
    }

    media.ontimeupdate = () => { 
        seekBar.value = media.currentTime; 
        const fmt = (t) => isNaN(t) ? "00:00" : `${Math.floor(t/60)}:${Math.floor(t%60).toString().padStart(2,'0')}`;
        document.getElementById('p-time').innerText = `${fmt(media.currentTime)} / ${fmt(media.duration)}`;
    };
    media.onloadedmetadata = () => { seekBar.max = media.duration; };
    seekBar.oninput = () => { media.currentTime = seekBar.value; };
</script>
</body>
</html>
