<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JTBP - App Radio Profesional</title>
    <style>
        body { 
            background-color: #050505; 
            color: #ffffff; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }
        
        h2 { margin-top: 40px; letter-spacing: 3px; text-transform: uppercase; font-size: 1rem; color: #888; }

        .stories-container { 
            display: flex; gap: 20px; padding: 30px; overflow-x: auto; width: 100%; justify-content: center; 
        }
        
        /* Círculo con borde neón sutil */
        .circle { 
            width: 80px; height: 80px; border-radius: 50%; 
            background: #222; /* Color oscuro base si no hay imagen */
            padding: 3px; cursor: pointer; transition: transform 0.3s; 
            border: 2px solid #444;
        }
        .circle:hover { transform: scale(1.1); border-color: #fff; }
        .circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        #story-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.95); z-index: 1000; justify-content: center; align-items: center; 
            backdrop-filter: blur(15px);
        }
        
        #story-overlay img { 
            max-height: 80vh; max-width: 85%; border-radius: 15px; 
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
        }

        .close-btn { position: absolute; top: 30px; right: 30px; font-size: 40px; color: #fff; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Programación en Vivo</h2>

    <div class="stories-container">
        <div class="circle" onclick="abrirPromo('promo_jazz.jpg')"><img src="promo_jazz.jpg" alt=""></div>
        <div class="circle" onclick="abrirPromo('promo_studio.jpg')"><img src="promo_studio.jpg" alt=""></div>
        <div class="circle" onclick="abrirPromo('promo_salsa.jpg')"><img src="promo_salsa.jpg" alt=""></div>
        <div class="circle" onclick="abrirPromo('promo_rock.jpg')"><img src="promo_rock.jpg" alt=""></div>
    </div>

    <div id="story-overlay">
        <span class="close-btn" onclick="cerrarPromo()">&times;</span>
        <img id="promo-img" src="" alt="Cargando...">
    </div>

    <script>
        function abrirPromo(fuente) {
            document.getElementById('promo-img').src = fuente;
            document.getElementById('story-overlay').style.display = 'flex';
        }
        function cerrarPromo() {
            document.getElementById('story-overlay').style.display = 'none';
        }
    </script>
</body>
</html>
