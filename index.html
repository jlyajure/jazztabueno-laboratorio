<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JTBP - Tu Radio</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* Contenedor de Círculos (Historias) */
        .stories-container { display: flex; gap: 15px; padding: 20px; overflow-x: auto; width: 100%; justify-content: center; }
        .circle { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #ff00ff; padding: 3px; cursor: pointer; transition: transform 0.2s; }
        .circle:hover { transform: scale(1.1); }
        .circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        /* Pantalla Completa (El Modal) */
        #story-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 1000; justify-content: center; align-items: center; 
        }
        #story-overlay img { height: 100vh; width: auto; max-width: 100%; object-fit: contain; }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 30px; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="margin-top: 20px;">Escucha tu Estilo</h2>

    <div class="stories-container">
        <div class="circle" onclick="abrirPromo('promo_jazz.jpg')">
            <img src="https://via.placeholder.com/100/0000FF/FFFFFF?text=JTB" alt="Jazz">
        </div>
        <div class="circle" onclick="abrirPromo('promo_studio.jpg')">
            <img src="https://via.placeholder.com/100/800080/FFFFFF?text=S79" alt="Studio 79">
        </div>
        <div class="circle" onclick="abrirPromo('promo_salsa.jpg')">
            <img src="https://via.placeholder.com/100/FF0000/FFFFFF?text=Salsa" alt="Salsa">
        </div>
        <div class="circle" onclick="abrirPromo('promo_rock.jpg')">
            <img src="https://via.placeholder.com/100/FFFF00/000000?text=Rock" alt="Rock">
        </div>
    </div>

    <div id="story-overlay">
        <span class="close-btn" onclick="cerrarPromo()">&times;</span>
        <img id="promo-img" src="" alt="Promo">
    </div>

    <script>
        function abrirPromo(nombreArchivo) {
            const overlay = document.getElementById('story-overlay');
            const imagen = document.getElementById('promo-img');
            
            // Asignamos la imagen y mostramos el panel
            imagen.src = nombreArchivo;
            overlay.style.display = 'flex';
            
            // Si la imagen falla (porque no existe el archivo), cerramos automáticamente
            imagen.onerror = function() {
                alert("Todavía no has subido el archivo: " + nombreArchivo);
                cerrarPromo();
            };
        }

        function cerrarPromo() {
            document.getElementById('story-overlay').style.display = 'none';
        }
    </script>
</body>
</html>
