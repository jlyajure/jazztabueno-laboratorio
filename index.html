<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Jazztabueno</title>
    
    <link rel="icon" type="image/png" href="https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png">
    <meta name="theme-color" content="#050505">
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="Jazztabueno Productions">
    <meta property="og:description" content="Escucha nuestros programas exclusivos de Radio.">
    <meta property="og:image" itemprop="image" content="https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png">
    <meta property="og:site_name" content="Jazztabueno Productions">

    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://widget.mixcloud.com/media/js/widgetApi.js"></script>
    
    <script>
        window.castUrl = ""; window.castTitle = ""; window.castCover = ""; window.lastTvTime = 0;
        window['__onGCastApiAvailable'] = function(isAvailable) {
            if (isAvailable) {
                const castContext = cast.framework.CastContext.getInstance();
                castContext.setOptions({ 
                    receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID, 
                    autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED 
                });
                const player = new cast.framework.RemotePlayer();
                const controller = new cast.framework.RemotePlayerController(player);
                controller.addEventListener(cast.framework.RemotePlayerEventType.CURRENT_TIME_CHANGED, () => {
                    window.lastTvTime = player.currentTime;
                });
                castContext.addEventListener(cast.framework.CastContextEventType.SESSION_STATE_CHANGED, (event) => {
                    const media = document.getElementById('main-media');
                    if (event.sessionState === 'SESSION_STARTED') {
                        media.pause();
                        const session = castContext.getCurrentSession();
                        const info = new chrome.cast.media.MediaInfo(window.castUrl, 'audio/mp3');
                        const meta = new chrome.cast.media.MusicTrackMediaMetadata();
                        meta.title = window.castTitle; meta.artist = "Jazztabueno Productions";
                        meta.images = [new chrome.cast.Image(window.castCover)];
                        info.metadata = meta;
                        const req = new chrome.cast.media.LoadRequest(info);
                        req.currentTime = media.currentTime;
                        session.loadMedia(req);
                    }
                });
            }
        };
    </script>
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>

    <style>
        :root { --gold: #a68a44; --bg: #050505; --card: #121212; --red: #ff4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: var(--bg); color: #ffffff; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

        header { background: rgba(0,0,0,0.98); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .brand-title { color: var(--gold); font-family: 'Playfair Display', serif; font-size: 14px; text-transform: uppercase; line-height: 1.2; letter-spacing: 0.5px; }
        .btn-salir { display: none; background: transparent !important; border: 2px solid var(--gold) !important; color: var(--gold) !important; padding: 7px 15px !important; border-radius: 8px !important; font-size: 10px !important; font-weight: 900 !important; cursor: pointer !important; }

        .btn-boveda-container { display: flex; align-items: center; gap: 8px; cursor: pointer; background: rgba(212, 175, 55, 0.1); padding: 5px 10px; border-radius: 12px; border: 1px solid var(--gold); transition: transform 0.2s; }
        .btn-boveda-container:active { transform: scale(0.95); }
        .btn-boveda-header { width: 38px; height: 38px; border-radius: 6px; box-shadow: 0 0 10px #0070f3; object-fit: cover; }
        .btn-boveda-text { color: var(--gold); font-size: 9px; font-weight: 900; text-transform: uppercase; line-height: 1.1; text-align: right; }

        #btn-volver-header { background: #111; border: 1px solid var(--gold); color: var(--gold); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 11px; display: none; }

        .container { max-width: 450px; margin: auto; padding: 15px; padding-bottom: 300px; }
        .channels-grid { display: grid !important; grid-template-columns: repeat(5, 1fr) !important; gap: 5px; margin-bottom: 25px; padding: 10px 0; }
        .ch-item { display: flex; flex-direction: column; align-items: center; text-align: center; opacity: 0.9; cursor: pointer; }
        .ch-logo { width: 44px; height: 44px; border-radius: 12px; border: 2.5px solid #222; margin-bottom: 6px; background: #000; object-fit: contain; }
        .active .ch-logo { border-color: var(--gold); }
        .ch-name { font-size: 6px; color: #ffffff; font-weight: 800; text-transform: uppercase; line-height: 1.1; width: 100%; text-align: center; }

        .card { background: var(--card); border-radius: 20px; margin-bottom: 30px; border: 1px solid #1a1a1a; overflow: hidden; }
        .card.playing { border-color: var(--gold); }
        .card-cover { width: 100%; height: 180px !important; background-size: cover; background-position: center; position: relative; border: 1.5px solid var(--gold); }
        .card-overlay { position: absolute; inset: 0; display: flex !important; align-items: center !important; justify-content: center !important; }
        .btn-play { background-color: var(--gold) !important; border: none !important; width: 55px !important; height: 55px !important; border-radius: 50% !important; display: flex !important; align-items: center !important; justify-content: center !important; cursor: pointer; padding: 0; }
        .btn-play svg { width: 28px !important; height: 28px !important; fill: black !important; }
        
        .info { padding: 20px; }
        .ep-title { margin: 8px 0 4px 0; font-size: 19px; font-weight: 800; color: #ffffff; display: flex; justify-content: space-between; align-items: start; }
        
        .btn-like { background:none; border:none; cursor:pointer; font-size:18px; color:#555; transition:0.2s; display:flex; flex-direction:column; align-items:center; }
        .btn-like.liked { color: var(--red); transform: scale(1.1); }
        .like-count { font-size: 9px; margin-top: 3px; font-weight: 800; color: #888; }

        .btn-list { background: #1a1a1a !important; border: 1.5px solid #333 !important; color: #ffffff !important; padding: 12px !important; border-radius: 12px !important; font-size: 11px !important; font-weight: 800 !important; width: 100% !important; cursor: pointer; margin-top:12px; }
        .list-box { display: none; margin-top: 15px; padding: 20px; background: #080808; border-radius: 15px; border: 1px solid #222; font-size: 14px; white-space: pre-wrap; }

        .jtbp-vault-bg { background: radial-gradient(circle, #222 10%, transparent 11%), #111; background-size: 10px 10px; border-top: 3px solid #D4AF37; padding: 20px 10px; text-align: center; border-radius: 20px; border: 1px solid #1a1a1a; margin-bottom: 30px; }
        
        .timeline-swipe {
            display: flex; overflow-x: auto; gap: 12px; padding: 10px 20px; 
            justify-content: flex-start; border-bottom: 1px solid #0070f3; margin-bottom: 20px; 
            padding-bottom: 15px; scrollbar-width: thin; scrollbar-color: var(--gold) #1a1a1a;
            -webkit-overflow-scrolling: touch; flex-wrap: nowrap;
        }
        .year-btn { 
            background: none; border: 1px solid #D4AF37; color: #D4AF37; padding: 6px 18px; 
            border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: bold; flex-shrink: 0; transition: 0.3s;
        }
        .year-btn.activo { background: #D4AF37; color: #000; box-shadow: 0 0 10px #D4AF37; }

        .grid-vault { display: grid; grid-template-columns: 1fr; gap: 10px; width: 100%; text-align: left; }
        .categoria-titulo-vault { color: #0070f3; border-bottom: 1px solid #333; margin-top: 15px; padding-bottom: 5px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; font-weight: bold;}
        
        .vault-card { background: #000; border-radius: 15px; padding: 15px; border: 1px solid #333; margin-bottom: 15px; text-align: left; }
        .vault-card.card-especial-v { border: 2px solid #D4AF37; box-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
        .mix-iframe-container { background: #000; border-radius: 8px; overflow: hidden; height: 60px; margin-top: 10px; border: 1px solid #222; }

        .vintage-player {
            background: #111; border: 1.5px solid #222; border-left: 4px solid var(--gold); border-radius: 8px;
            display: flex; align-items: center; padding: 10px; margin-top: 10px; gap: 12px;
        }
        .vintage-player.playing { border-color: var(--gold); }
        .vp-cover { width: 55px; height: 55px; border-radius: 6px; border: 1px solid #333; flex-shrink: 0; background-color: #000; object-fit: contain; }
        .vp-info { flex: 1; display: flex; flex-direction: column; gap: 6px; overflow: hidden; }
        .vp-title { color: #fff; font-size: 12px; font-weight: 800; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .vp-controls { display: flex; align-items: center; gap: 10px; width: 100%; }
        .vp-btn { background: var(--gold); border: none; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; flex-shrink: 0; transition: transform 0.2s; }
        .vp-btn:active { transform: scale(0.9); }
        .vp-btn svg { width: 14px; height: 14px; fill: #000; }
        .vp-slider { flex: 1; height: 4px; -webkit-appearance: none; background: #333; border-radius: 2px; outline: none; }
        .vp-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--gold); border-radius: 50%; cursor: pointer; box-shadow: 0 0 5px rgba(212, 175, 55, 0.5); }
        .vp-time { color: var(--gold); font-size: 9px; font-weight: 900; min-width: 32px; text-align: right; font-family: monospace; }

        .comments-section { display:none; margin-top:15px; background:#080808; border-radius:15px; padding:15px; border:1px solid #222; }
        .c-input { width:100%; background:#1a1a1a; border:1px solid #333; color:white; padding:10px; border-radius:8px; margin-bottom:8px; font-family:inherit; font-size:12px; }
        .c-btn { width:100%; background:#333; color:white; border:none; padding:10px; border-radius:8px; font-weight:bold; cursor:pointer; }
        .c-list { margin-top:15px; max-height:200px; overflow-y:auto; }
        .c-item { margin-bottom:12px; border-bottom:1px solid #1a1a1a; padding-bottom:8px; }
        .c-user { font-weight:800; color:var(--gold); font-size:11px; margin-bottom:2px; display:flex; justify-content:space-between; align-items:center; }
        .c-msg { font-size:12px; color:#ddd; line-height:1.3; }
        .c-reply { margin-top:6px; padding:8px; background:#111; border-left:2px solid var(--gold); border-radius:0 6px 6px 0; }
        .c-reply-head { font-size:9px; font-weight:900; color:var(--gold); margin-bottom:2px; }
        .c-reply-msg { font-size:11px; color:#fff; font-style:italic; }

        .btn-admin-reply { background:transparent; border:1px solid #444; color:#888; font-size:9px; padding:2px 6px; border-radius:4px; cursor:pointer; margin-left:5px; }
        .btn-admin-del { background:transparent; border:none; color:#ff4444; font-size:10px; cursor:pointer; margin-left:5px; }

        #global-player { position: fixed; bottom: 0; left: 0; width: 100%; background: #080808; border-top: 3px solid var(--gold); padding: 15px 20px; display: none; z-index: 1000; box-shadow: 0 -10px 30px rgba(0,0,0,0.8); }
        .p-vinyl { width: 55px; height: 55px; border-radius: 50%; border: 2.3px solid var(--gold); background-size: cover; animation: rot 4s linear infinite; animation-play-state: paused; flex-shrink: 0; }
        .playing .p-vinyl { animation-play-state: running; }
        @keyframes rot { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .controls { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #222; padding-top: 15px; margin-top: 12px; gap: 10px; }
        .ctrl-btn { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 12px 5px; border-radius: 12px; font-size: 9px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: 0.2s; }
        .ctrl-btn:active { transform: scale(0.95); border-color: var(--gold); }
        
        google-cast-launcher { width: 20px; height: 20px; --disconnected-color: var(--gold); cursor: pointer; display: inline-block; }
        
        .contador-oyentes { display: flex; align-items: center; gap: 5px; background: #1a1a1a; padding: 4px 10px; border-radius: 20px; border: 1px solid #333; font-size: 11px; color: #aaa; font-weight: bold; }
        .contador-oyentes span { color: var(--gold); }
        #visualizador { width: 100%; height: 35px; background: transparent; margin-top: 5px; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div id="app-content">
    <header>
        <div style="display:flex; align-items:center; gap:12px; cursor:pointer;" id="admin-trigger">
            <img src="logo.png" width="35" height="35" onerror="this.src='https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png'">
            <div class="brand-title">JAZZTABUENO<br>PRODUCTIONS</div>
        </div>
        
        <div style="display:flex; align-items:center; gap:12px;">
            <div id="btn-boveda-header" class="btn-boveda-container" onclick="window.openVault()">
                <div class="btn-boveda-text">BÓVEDA DEL<br>LEGADO</div>
                <img src="baul.png" onerror="this.src='baul.jpg'" class="btn-boveda-header" alt="Baúl">
            </div>
            
            <button id="btn-volver-header" onclick="window.closeVault()">⬅ VOLVER</button>
            <button onclick="window.doLogout()" class="btn-salir" id="btn-salir">SALIR</button>
        </div>
    </header>

    <div id="main-view" class="container">
        <div id="admin-panel" style="display:none; background:#111; padding:25px; border-radius:25px; border:2px solid var(--gold); margin-bottom:30px;">
            <input type="hidden" id="edit-id">
            <input type="text" id="t-titulo" style="width:100%; padding:14px; background:#000; color:white; border:1px solid #333; border-radius:10px; margin-bottom:10px;" placeholder="Título">
            <select id="t-programa" style="width:100%; padding:14px; background:#000; color:white; border:1px solid #333; border-radius:10px; margin-bottom:10px;">
                <option value="JAZZTABUENO">JAZZTABUENO</option>
                <option value="STUDIO 79">STUDIO 79</option>
                <option value="SALSA BRAVA">SALSA BRAVA</option>
                <option value="OLD SCHOOL RADIO">OLD SCHOOL RADIO</option>
            </select>
            <input type="text" id="t-url" style="width:100%; padding:14px; background:#000; color:white; border:1px solid #333; border-radius:10px; margin-bottom:10px;" placeholder="URL MP3">
            <input type="text" id="t-img" style="width:100%; padding:14px; background:#000; color:white; border:1px solid #333; border-radius:10px; margin-bottom:10px;" placeholder="URL Portada">
            <input type="text" id="t-tags" style="width:100%; padding:14px; background:#000; color:white; border:1px solid #333; border-radius:10px; margin-bottom:10px;" placeholder="Hashtags">
            <textarea id="t-playlist" style="width:100%; height:120px; background:#000; color:white; border:1px solid var(--gold); border-radius:10px; padding:10px; margin-bottom:15px;" placeholder="Lista..."></textarea>
            <div style="display:flex; gap:10px;">
                <button id="btn-save" style="flex:2; background:var(--gold); border:none; padding:15px; border-radius:12px; font-weight:800; cursor:pointer;">💾 GUARDAR</button>
                <button onclick="window.cancelEdit()" style="flex:1; background:transparent; border:1px solid #444; color:#888; border-radius:12px; cursor:pointer;">❌</button>
            </div>
        </div>

        <div class="channels-grid">
            <div class="ch-item active" onclick="window.setFilter('Todo', this)"><img src="https://i.postimg.cc/8c7Smws4/logos-programas-jtbp.jpg" class="ch-logo"><span class="ch-name">Todo</span></div>
            <div class="ch-item" onclick="window.setFilter('JAZZTABUENO', this)"><img src="https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png" class="ch-logo"><span class="ch-name">Jazztabueno</span></div>
            <div class="ch-item" onclick="window.setFilter('STUDIO 79', this)"><img src="https://i.postimg.cc/NKMDbYJB/S79.png" class="ch-logo"><span class="ch-name">Studio 79</span></div>
            <div class="ch-item" onclick="window.setFilter('SALSA BRAVA', this)"><img src="https://i.postimg.cc/75fchgyt/Salsa-Brava.png" class="ch-logo"><span class="ch-name">Salsa Brava</span></div>
            <div class="ch-item" onclick="window.setFilter('OLD SCHOOL RADIO', this)"><img src="https://i.postimg.cc/jwQ3mczC/Old-School-Radio.png" class="ch-logo"><span class="ch-name">Old School Radio</span></div>
        </div>
        <div id="feed"></div>
    </div>
    
    <div id="vault-view" class="container" style="display:none;">
        <section class="jtbp-vault-bg">
            <div class="vault-header-bar" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="color:var(--gold); margin:0; font-size:14px; text-transform:uppercase; letter-spacing:1px; text-align: left;">Bóveda del<br>Legado</h2>
            </div>
            <br>
            <div class="alerta-gala">
                <i>⚠️ <strong>Aviso:</strong> Para escuchar, presiona únicamente el botón de <strong>▶ PLAY</strong>.</i><br><br>
                <i>⭐ <strong>Nota:</strong> Los programas con marco iluminado son <strong>Ediciones Especiales</strong>.</i>
            </div>

            <div class="timeline-swipe">
                <button class="year-btn" id="btn-2025" onclick="window.mostrarPorAño(2025, this)">2025</button>
                <button class="year-btn" onclick="window.mostrarPorAño(2024, this)">2024</button>
                <button class="year-btn" onclick="window.mostrarPorAño(2023, this)">2023</button>
                <button class="year-btn" onclick="window.mostrarPorAño(2022, this)">2022</button>
                <button class="year-btn" onclick="window.mostrarPorAño(2021, this)">2021</button>
                <button class="year-btn" onclick="window.mostrarPorAño(2020, this)">2020</button>
            </div>
            <br>
            <div id="grid-archivos" class="grid-vault"></div>
        </section>
    </div>
</div>

<div id="global-player">
    <audio id="main-media" playsinline webkit-playsinline></audio>
    <div style="display:flex; align-items:center; gap:15px; margin-bottom:5px;">
        <div id="p-vinyl" class="p-vinyl" style="background-image: url('https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png');"></div>
        <div style="flex:1; overflow:hidden;">
            <h4 id="p-title" style="margin:0; font-size:15px; color:#ffffff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:800;">...</h4>
            <div id="p-time" style="font-size:12px; color:var(--gold); font-weight:900; margin-top:3px;">00:00 / 00:00</div>
        </div>
        <button onclick="window.doToggle()" id="p-play-btn" style="background:none; border:none; cursor:pointer; flex-shrink: 0;"></button>
        <button onclick="window.doClose()" style="background:none; border:none; color:#666; font-size:28px; flex-shrink: 0;">×</button>
    </div>
    <canvas id="visualizador"></canvas>
    <input type="range" id="seek-bar" value="0" min="0" step="1" style="width:100%;">
    <div class="controls">
        <div class="ctrl-btn" style="display:flex; align-items:center; gap:8px;">
            <google-cast-launcher></google-cast-launcher><span style="color:var(--gold);">Google TV</span>
        </div>
        <button onclick="window.doSpeed()" id="btn-speed" class="ctrl-btn">1.0x</button>
        <button onclick="window.doMute()" id="btn-mute" class="ctrl-btn">🔊 VOL</button>
    </div>
</div>

<script>
    const SVG_PLAY = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="white"/></svg>`; 
    const SVG_PAUSE = `<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" fill="white"/></svg>`;

    window.MIS_ARCHIVOS_BOVEDA = [
        { año: 2025, categoria: "Studio 79", titulo: "Especial Studio Mix Two", url: "https://archive.org/download/studio-79-13-2025-especial-studio-mix-one/Studio79%20-%2019_2025%20_ESPECIAL%20STUDIO%20MIX%20TWO_.mp3", plataforma: "archive" },
        { año: 2025, categoria: "Studio 79", titulo: "Funky Fever", url: "https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=%2FStudio79%2Fstudio79-182025-funky-fever%2F", plataforma: "mixcloud" },
        { año: 2025, categoria: "Studio 79", titulo: "Especial Studio Mix One", url: "https://archive.org/download/studio-79-13-2025-especial-studio-mix-one/Studio79%20-%2013_2025%20_ESPECIAL%20STUDIO%20MIX%20ONE_.mp3", plataforma: "archive" },
        { año: 2025, categoria: "Studio 79", titulo: "Disco Nights", url: "https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=%2FStudio79%2Fstudio79-122025-disco-nights%2F", plataforma: "mixcloud" },
        { año: 2025, categoria: "Studio 79", titulo: "Rhythm & Blues", url: "https://archive.org/download/programa-11-rhythm-blues/Programa%2011%20%28Rhythm%20%26%20Blues%29.mp3", plataforma: "archive" }, 
        { año: 2024, categoria: "STUDIO 79", titulo: "Programa 5 Clásico", url: "https://archive.org/download/studio-79-programa-5/Studio%2079%20Programa%205.mp3", plataforma: "archive" },
        { año: 2022, categoria: "JAZZTABUENO", titulo: "Programa 1", url: "https://archive.org/download/jazztabueno-programa-1-2022/Jazztabueno%20Programa%201-2022.mp3", plataforma: "archive" }
    ];

    window.openVault = () => {
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('vault-view').style.display = 'block';
        window.mostrarPorAño(2025, document.getElementById('btn-2025')); 
    };

    window.closeVault = () => {
        document.getElementById('vault-view').style.display = 'none';
        document.getElementById('main-view').style.display = 'block';
    };

    window.mostrarPorAño = (año, botonApretado) => {
        const botones = document.querySelectorAll('.year-btn');
        botones.forEach(b => b.classList.remove('activo'));
        if(botonApretado) botonApretado.classList.add('activo');
        const grid = document.getElementById('grid-archivos');
        const filtrados = window.MIS_ARCHIVOS_BOVEDA.filter(item => item.año === año);
        if (filtrados.length === 0) { grid.innerHTML = `<p style="color:#D4AF37;">Cargando...</p>`; return; }
        let contenidoHtml = "";
        filtrados.forEach(item => {
            contenidoHtml += `<div class="vault-card"><h3>${item.titulo}</h3><audio controls src="${item.url}"></audio></div>`;
        });
        grid.innerHTML = contenidoHtml;
    };
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { initializeFirestore, collection, query, orderBy, onSnapshot, addDoc, deleteDoc, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyBwBq4gLgv4DSfUidzUuC7Irmvj_4pCTtI", authDomain: "familia-yajure-app.firebaseapp.com", projectId: "familia-yajure-app", storageBucket: "familia-yajure-app.firebasestorage.app", messagingSenderId: "692035727386", appId: "1:692035727386:web:dfa3e39a481d56368a61a3" };
    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, { experimentalForceLongPolling: true });

    const media = document.getElementById('main-media');
    let idActual = null;
    let programas = [];

    window.playItem = (id, url, tit, img) => {
        if(idActual === id) {
            media.paused ? media.play() : media.pause();
        } else {
            idActual = id;
            media.src = url;
            media.play();
            document.getElementById('p-title').innerText = tit;
            document.getElementById('p-vinyl').style.backgroundImage = `url('${img}')`;
            document.getElementById('global-player').style.display = 'block';
        }
        render();
    };

    window.doToggle = () => { media.paused ? media.play() : media.pause(); render(); };
    window.doClose = () => { media.pause(); document.getElementById('global-player').style.display='none'; idActual=null; render(); };

    onSnapshot(query(collection(db, "radio_programas"), orderBy("fecha", "desc")), (snap) => { 
        programas = []; snap.forEach(d => programas.push({id: d.id, ...d.data()})); render(); 
    });

    function render() {
        const feed = document.getElementById('feed'); if(!feed) return; feed.innerHTML = "";
        programas.forEach(p => {
            const isPlaying = idActual === p.id && !media.paused;
            const div = document.createElement('div'); div.className = `card`;
            div.innerHTML = `
                <div class="card-cover" style="background-image: url('${p.imagenUrl}')">
                    <div class="card-overlay"><button class="btn-play" onclick="window.playItem('${p.id}','${p.mp3Url}','${p.titulo}','${p.imagenUrl}')">${isPlaying ? '⏸' : '▶'}</button></div>
                </div>
                <div class="info">
                    <h3 class="ep-title">${p.titulo}</h3>
                    <p style="color:var(--gold); font-size:10px;">${p.programa}</p>
                </div>`;
            feed.appendChild(div);
        });
    }
</script>
</body>
</html>
