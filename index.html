<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio de Stories - JTBP</title>
    <style>
        /* Estilos generales del laboratorio oscuro para resaltar colores */
        body { 
            font-family: sans-serif; background-color: #111; color: white; 
            display: flex; flex-direction: column; align-items: center; padding-top: 50px; 
        }
        
        /* Contenedor de los avatares (los circulitos de arriba) */
        .stories-bar { display: flex; gap: 20px; margin-bottom: 40px; }
        
        .story-circle { 
            width: 80px; height: 80px; border-radius: 50%; 
            border: 3px solid #ff007f; /* Anillo de color estilo Instagram */
            cursor: pointer; overflow: hidden; display: flex; 
            align-items: center; justify-content: center; font-weight: bold;
            transition: transform 0.2s;
        }
        .story-circle:hover { transform: scale(1.1); }

        /* Colores temporales para identificar cada programa en el laboratorio */
        .jazz { background: linear-gradient(45deg, #00d2ff, #3a7bd5); }
        .salsa { background: linear-gradient(45deg, #ff416c, #ff4b2b); }
        .studio { background: linear-gradient(45deg, #bf953f, #fcf6ba); color: black; }
        .rock { background: linear-gradient(45deg, #2b5876, #4e4376); }

        /* Pantalla completa que se abre al tocar una historia */
        .story-viewer {
            display: none; /* Oculto hasta que se haga clic */
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 1000; justify-content: center; align-items: center; flex-direction: column;
        }
        
        /* Botón para cerrar */
        .close-btn { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; font-weight: bold;}
        
        /* Barra de tiempo arriba de la imagen */
        .progress-bar { width: 90%; height: 4px; background: #555; margin-top: 20px; border-radius: 2px; position: absolute; top: 10px;}
        .progress-fill { height: 100%; background: white; width: 0%; transition: width 4s linear; /* Dura 4 segundos */ }
        
        /* Contenedor de la imagen de promoción */
        .promo-content { width: 300px; height: 500px; background: #222; border: 2px solid #444; border-radius: 15px; display: flex; align-items: center; justify-content: center; flex-direction: column;}
    </style>
</head>
<body>

    <h2>Laboratorio de Pruebas: Stories</h2>
    <p style="color: #aaa; margin-bottom: 30px;">Toca un círculo para ver la magia.</p>

    <div class="stories-bar">
        <div class="story-circle jazz" onclick="openStory('JazzTaBueno')">JTB</div>
        <div class="story-circle salsa" onclick="openStory('Salsa Brava')">SB</div>
        <div class="story-circle studio" onclick="openStory('Studio 79')">S79</div>
        <div class="story-circle rock" onclick="openStory('Old School')">ROCK</div>
    </div>

    <div class="story-viewer" id="storyViewer">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <span class="close-btn" onclick="closeStory()">&times;</span>
        
        <div class="promo-content">
            <h2 id="storyTitle" style="color: #fff; margin-bottom: 20px;">Título</h2>
            <p style="color: #aaa; text-align: center; padding: 20px;">Aquí irá la imagen del póster de <br><strong id="storyImageText" style="color: white; font-size: 20px;"></strong></p>
        </div>
    </div>

    <script>
        let storyTimeout;

        function openStory(programName) {
            const viewer = document.getElementById('storyViewer');
            const title = document.getElementById('storyTitle');
            const imageText = document.getElementById('storyImageText');
            const progressFill = document.getElementById('progressFill');

            // 1. Cambiar los textos según el círculo que tocaste
            title.innerText = "¡Al Aire: " + programName + "!";
            imageText.innerText = programName;

            // 2. Mostrar la pantalla negra
            viewer.style.display = 'flex';
            
            // 3. Iniciar la animación de la barrita blanca de tiempo
            setTimeout(() => { progressFill.style.width = '100%'; }, 50);

            // 4. Cerrar automáticamente la historia después de 4 segundos
            storyTimeout = setTimeout(() => {
                closeStory();
            }, 4000);
        }

        function closeStory() {
            const viewer = document.getElementById('storyViewer');
            const progressFill = document.getElementById('progressFill');
            
            // Ocultar todo y reiniciar la barrita
            viewer.style.display = 'none';
            progressFill.style.width = '0%';
            clearTimeout(storyTimeout);
        }
    </script>
</body>
</html>
