<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio de Stories - JTBP</title>
    <style>
        body { 
            font-family: sans-serif; background-color: #111; color: white; 
            display: flex; flex-direction: column; align-items: center; padding-top: 50px; 
        }
        
        .stories-bar { display: flex; gap: 20px; margin-bottom: 40px; }
        
        .story-circle { 
            width: 80px; height: 80px; border-radius: 50%; 
            border: 3px solid #ff007f;
            cursor: pointer; overflow: hidden; 
            transition: transform 0.2s;
            background-color: #222; 
        }
        .story-circle:hover { transform: scale(1.1); }
        
        .story-circle img { width: 100%; height: 100%; object-fit: cover; }

        .story-viewer {
            display: none; 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 1000; justify-content: center; align-items: center; flex-direction: column;
        }
        
        .close-btn { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; font-weight: bold;}
        
        .progress-bar { width: 90%; height: 4px; background: #555; margin-top: 20px; border-radius: 2px; position: absolute; top: 10px;}
        .progress-fill { height: 100%; background: white; width: 0%; transition: width 4s linear; }
        
        .promo-content { width: 320px; text-align: center;}
        
        .promo-image { width: 100%; border-radius: 15px; box-shadow: 0 0 20px rgba(255, 0, 127, 0.5); }
    </style>
</head>
<body>

    <h2>Laboratorio de Pruebas: Stories</h2>
    <p style="color: #aaa; margin-bottom: 30px;">Toca un círculo para ver la magia.</p>

    <div class="stories-bar">
        <div class="story-circle" onclick="openStory('JazzTaBueno', 'jazz.jpg')">
            <img src="jazz.jpg" alt="JTB">
        </div>
        <div class="story-circle" onclick="openStory('Salsa Brava', 'salsa.jpg')">
            <img src="salsa.jpg" alt="SB">
        </div>
        <div class="story-circle" onclick="openStory('Studio 79', 's79.jpg')">
            <img src="s79.jpg" alt="S79">
        </div>
        <div class="story-circle" onclick="openStory('Old School Rock', 'rock.jpg')">
            <img src="rock.jpg" alt="ROCK">
        </div>
    </div>

    <div class="story-viewer" id="storyViewer">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <span class="close-btn" onclick="closeStory()">&times;</span>
        
        <div class="promo-content">
            <h2 id="storyTitle" style="color: #fff; margin-bottom: 15px;">Título</h2>
            <img id="storyImageLarge" class="promo-image" src="" alt="Promo">
        </div>
    </div>

    <script>
        let storyTimeout;

        function openStory(programName, imageFileName) {
            const viewer = document.getElementById('storyViewer');
            const title = document.getElementById('storyTitle');
            const imageLarge = document.getElementById('storyImageLarge');
            const progressFill = document.getElementById('progressFill');

            title.innerText = "¡Al Aire: " + programName + "!";
            imageLarge.src = imageFileName; 

            viewer.style.display = 'flex';
            setTimeout(() => { progressFill.style.width = '100%'; }, 50);

            storyTimeout = setTimeout(() => { closeStory(); }, 4000);
        }

        function closeStory() {
            const viewer = document.getElementById('storyViewer');
            const progressFill = document.getElementById('progressFill');
            
            viewer.style.display = 'none';
            progressFill.style.width = '0%';
            clearTimeout(storyTimeout);
        }
    </script>
</body>
</html>
