<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB: JTBP Multicanal VIP</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Estilos específicos para el nuevo tablero (puedes moverlos a styles.css luego) */
        :root {
            --bg-color: #0d0d0d; /* Negro más profundo para laboratorio */
            --card-bg: #1a1a1a;
            --primary: #d4af37; /* Dorado VIP */
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .header h1 { color: var(--primary); margin: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        .header p { color: #ff4c4c; margin: 5px 0 0 0; font-weight: bold; font-size: 14px; } /* Rojo para indicar LAB */
        
        /* El nuevo Tablero de Control de Canales (Selector de Entradas) */
        .control-panel {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #333;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 480px;
            margin-bottom: 25px;
        }
        .panel-title { color: var(--primary); font-size: 12px; font-weight: bold; text-align: center; margin-bottom: 10px; text-transform: uppercase; }
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 columnas de botones */
            gap: 10px;
        }
        .channel-btn {
            background-color: #252525;
            color: var(--text-main);
            border: 1px solid #444;
            padding: 12px 5px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .channel-btn .icon { font-size: 18px; }
        .channel-btn.active {
            background-color: var(--primary);
            color: #000;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }
        .channel-btn:hover:not(.active) { border-color: var(--primary); color: var(--primary); }

        /* Contenedor Principal del Reproductor Activo */
        .player-stage {
            width: 100%;
            max-width: 480px;
            min-height: 300px;
            background-color: var(--card-bg);
            border-radius: 15px;
            border: 1px solid #333;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
            overflow: hidden; /* Para redondear los bordes de los iframes */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .player-content { display: none; width: 100%; height: 100%; }
        .player-content.active { display: block; }
        
        /* Diseño del Canal JTBP Original (Tu reproductor actual) */
        .jtbp-local { padding: 30px; text-align: center; }
        .album-art { width: 120px; height: 120px; background-color: #2a2a2a; border-radius: 50%; margin: 0 auto 20px; border: 3px solid var(--primary); display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .btn-play { background-color: var(--primary); color: #000; border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 24px; cursor: pointer; }

        /* Estilos para Iframe (YouTube, Mixcloud, etc.) */
        iframe { width: 100%; height: 100%; border: none; display: block; }
        .iframe-container { width: 100%; height: 352px; } /* Altura estándar para reproductores */
    </style>
</head>
<body>

    <div class="header">
        <h1>JTBP PRODUCTIONS</h1>
        <p>🔬 LABORATORIO DE PRUEBAS 🔬</p>
    </div>

    <div class="control-panel">
        <div class="panel-title">Seleccionar Fuente de Audio</div>
        <div class="channel-grid">
            <button class="channel-btn active" onclick="switchInput('jtbp')">
                <span class="icon">🎙️</span> JTBP Orig.
            </button>
            <button class="channel-btn" onclick="switchInput('youtube')">
                <span class="icon">📺</span> YouTube VIP
            </button>
            <button class="channel-btn" onclick="switchInput('mixcloud')">
                <span class="icon">☁️</span> Mixcloud
            </button>
            <button class="channel-btn" onclick="switchInput('spotify')">
                <span class="icon">🎧</span> Spotify*
            </button>
            <button class="channel-btn" onclick="switchInput('radio_jazz')">
                <span class="icon">🎷</span> Radio Jazz
            </button>
            <button class="channel-btn" onclick="switchInput('radio_retro')">
                <span class="icon">🕺</span> Retro/Salsa
            </button>
        </div>
        <div style="font-size: 9px; color: var(--text-muted); text-align: center; margin-top: 10px;">
            * Spotify requiere cuenta Premium en navegador para evitar cortes de 30s.
        </div>
    </div>

    <div class="player-stage">
        
        <div id="jtbp" class="player-content active jtbp-local">
            <div class="album-art">🎶</div>
            <h3 style="color: var(--primary); margin: 0;">Podcast Original</h3>
            <p style="color: var(--text-muted); font-size: 12px; margin: 5px 0 20px;">Tu motor de audio de siempre</p>
            <button class="btn-play">▶</button>
            <script src="app.js"></script>
        </div>

        <div id="youtube" class="player-content">
            <iframe src="https://www.youtube.com/embed/5yTz_bT1Ruw" title="YouTube VIP" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>

        <div id="mixcloud" class="player-content iframe-container">
            <iframe width="100%" height="120" src="https://www.mixcloud.com/widget/iframe/?hide_cover=1&feed=%2FThe_Craig_Charles_Funk_And_Soul_Show%2Ffunk-and-soul-show-261122%2F" frameborder="0" ></iframe>
        </div>

        <div id="spotify" class="player-content iframe-container">
            <iframe src="https://open.spotify.com/embed/playlist/37i9dQZF1DWVqfgj8NZEp1?utm_source=generator&theme=0" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>

        <div id="radio_jazz" class="player-content iframe-container">
             <iframe src="https://tunein.com/embed/player/s249964/" style="width:100%; height:100px;" scrolling="no" frameborder="no"></iframe>
        </div>

        <div id="radio_retro" class="player-content iframe-container">
             <iframe src="https://tunein.com/embed/player/s136476/" style="width:100%; height:100px;" scrolling="no" frameborder="no"></iframe>
        </div>

    </div>

    <script>
        // Lógica mecánica para cambiar las "Entradas de Audio"
        function switchInput(inputId) {
            // 1. Pausar el reproductor local si estaba sonando
            if (window.player && typeof window.player.pause === 'function') {
                window.player.pause(); // Asumiendo que app.js expone el objeto player
            }
            // (Opcional: Detener otros iframes si es posible, aunque la mayoría se pausa al ocultarse)

            // 2. Ocultar todos los escenarios de reproducción
            document.querySelectorAll('.player-content').forEach(el => {
                el.classList.remove('active');
            });
            // 3. Quitar clase activa de todos los botones del tablero
            document.querySelectorAll('.channel-btn').forEach(el => {
                el.classList.remove('active');
            });

            // 4. Mostrar el escenario seleccionado
            document.getElementById(inputId).classList.add('active');
            
            // 5. Marcar el botón presionado como activo
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
