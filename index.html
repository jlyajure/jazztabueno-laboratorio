<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio Pro - JTBP</title>
    <style>
        body { 
            font-family: sans-serif; background-color: #050505; color: white; 
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }

        /* BARRA DE HISTORIAS (CIRCULITOS) */
        .stories-bar { display: flex; gap: 15px; margin-bottom: 30px; }
        .story-circle { 
            width: 70px; height: 70px; border-radius: 50%; 
            border: 3px solid #ff007f; cursor: pointer; overflow: hidden; 
            background-color: #222;
        }
        .story-circle img { width: 100%; height: 100%; object-fit: cover; }

        /* MENÚ DE PROGRAMAS (CUADRADOS) */
        .main-menu { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; 
            width: 100%; max-width: 350px; 
        }
        .program-card { 
            background-color: #1a1a1a; border-radius: 20px; 
            aspect-ratio: 1 / 1; overflow: hidden; cursor: pointer;
            border: 1px solid #333;
        }
        .program-card img { width: 100%; height: 100%; object-fit: cover; }

        /* VISOR DE HISTORIAS */
        .story-viewer {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.98); z-index: 1000; 
            justify-content: center; align-items: center; flex-direction: column;
        }
        .close-btn { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; }
        .progress-bar { width: 90%; height: 4px; background: #333; position: absolute; top: 15px; border-radius: 2px; }
        .progress-fill { height: 100%; background: white; width: 0%; transition: width 4s linear; }
        .promo-image { width: 85%; border-radius: 15px; box-shadow: 0 0 30px rgba(255, 0, 127, 0.4); }
    </style>
</head>
<body>

    <h3 style="color: #ff007f;">JAZZTABUENO</h3>
    <p style="color: #666; font-size: 0.8em; margin-bottom: 25px;">LABORATORIO DE DISEÑO</p>

    <div class="stories-bar">
        <div class="story-circle" onclick="openStory('JTB', 'jazz.jpg')"><img src="jazz.jpg"></div>
        <div class="story-circle" onclick="openStory('Salsa Brava', 'salsa.jpg')"><img src="salsa.jpg"></div>
        <div class="story-circle" onclick="openStory('Studio 79', 's79.jpg')"><img src="s79.jpg"></div>
        <div class="story-circle" onclick="openStory('Old School', 'rock.jpg')"><img src="rock.jpg"></div>
    </div>

    <div class="main-menu">
        <div class="program-card" onclick="alert('Abriendo Radio JTB...')"><img src="jazz.jpg"></div>
        <div class="program-card" onclick="alert('Abriendo Radio Salsa...')"><img src="salsa.jpg"></div>
        <div class="program-card" onclick="alert('Abriendo Radio S79...')"><img src="s79.jpg"></div>
        <div class="program-card" onclick="alert('Abriendo Radio Rock...')"><img src="rock.jpg"></div>
    </div>

    <div class="story-viewer" id="storyViewer">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <span class="close-btn" onclick="closeStory()">&times;</span>
        <h2 id="storyTitle"></h2>
        <img id="storyImageLarge" class="promo-image" src="">
    </div>

    <script>
        let storyTimeout;
        function openStory(name, img) {
            const viewer = document.getElementById('storyViewer');
            const progress = document.getElementById('progressFill');
            document.getElementById('storyTitle').innerText = "PROMO: " + name;
            document.getElementById('storyImageLarge').src = img;
            viewer.style.display = 'flex';
            setTimeout(() => { progress.style.width = '100%'; }, 50);
            storyTimeout = setTimeout(() => { closeStory(); }, 4000);
        }
        function closeStory() {
            document.getElementById('storyViewer').style.display = 'none';
            document.getElementById('progressFill').style.width = '0%';
            clearTimeout(storyTimeout);
        }
    </script>
</body>
</html>
