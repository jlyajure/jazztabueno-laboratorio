<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JTBP Radio - V3 FORCE</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* SI VES ESTE TÍTULO EN ROJO, EL CÓDIGO POR FIN SE ACTUALIZÓ */
        .test-banner { background: red; color: white; padding: 10px; width: 100%; text-align: center; font-weight: bold; }

        .stories-container { display: flex; gap: 15px; padding: 20px; justify-content: center; }
        
        .circle { 
            width: 80px; height: 80px; border-radius: 50%; 
            border: 3px solid #d4af37; /* Borde Dorado */
            overflow: hidden; cursor: pointer;
        }

        /* EL SECRETO PARA QUE NO SE APLASTEN */
        .circle img { 
            width: 100%; height: 100%; 
            object-fit: cover; /* Esto las recorta perfecto al círculo */
        }

        #overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; 
        }
        #overlay img { max-height: 85vh; max-width: 90%; border-radius: 10px; }
        .close { position: absolute; top: 20px; right: 20px; font-size: 40px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="test-banner">V3 - ACTUALIZACIÓN FORZADA</div>

    <div class="stories-container">
        <div class="circle" onclick="abrir('promo_jazz.jpg?v=2')"><img src="promo_jazz.jpg?v=2"></div>
        <div class="circle" onclick="abrir('promo_studio.jpg?v=2')"><img src="promo_studio.jpg?v=2"></div>
        <div class="circle" onclick="abrir('promo_salsa.jpg?v=2')"><img src="promo_salsa.jpg?v=2"></div>
        <div class="circle" onclick="abrir('promo_rock.jpg?v=2')"><img src="promo_rock.jpg?v=2"></div>
    </div>

    <div id="overlay" onclick="cerrar()">
        <span class="close">&times;</span>
        <img id="full-img">
    </div>

    <script>
        function abrir(src) {
            document.getElementById('full-img').src = src;
            document.getElementById('overlay').style.display = 'flex';
        }
        function cerrar() {
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
