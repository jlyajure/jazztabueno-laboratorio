    <script>
        window.castUrl = ""; window.castTitle = ""; window.castCover = ""; window.lastTvTime = 0;
        window['__onGCastApiAvailable'] = function(isAvailable) {
            if (isAvailable) {
                const castContext = cast.framework.CastContext.getInstance();
                castContext.setOptions({ receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID, autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED });
                
                const player = new cast.framework.RemotePlayer();
                const controller = new cast.framework.RemotePlayerController(player);
                
                controller.addEventListener(cast.framework.RemotePlayerEventType.CURRENT_TIME_CHANGED, () => {
                    window.lastTvTime = player.currentTime;
                });

                castContext.addEventListener(cast.framework.CastContextEventType.SESSION_STATE_CHANGED, (event) => {
                    const media = document.getElementById('main-media');
                    if (event.sessionState === 'SESSION_STARTED') {
                        media.pause();
                        const session = castContext.getCurrentSession();
                        const info = new chrome.cast.media.MediaInfo(window.castUrl, 'audio/mp3');
                        const meta = new chrome.cast.media.MusicTrackMediaMetadata();
                        meta.title = window.castTitle; 
                        meta.artist = "Jazztabueno Productions";
                        meta.images = [new chrome.cast.Image(window.castCover)];
                        info.metadata = meta;
                        const req = new chrome.cast.media.LoadRequest(info);
                        req.currentTime = media.currentTime;
                        session.loadMedia(req);
                    }
                    if (event.sessionState === 'SESSION_ENDED') {
                        if (window.lastTvTime > 0) media.currentTime = window.lastTvTime;
                        setTimeout(() => { media.play().catch(()=>{}); if(window.actualizarUI) window.actualizarUI(); }, 500);
                    }
                });
            }
        };
    </script>
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>

    <style>
        :root { --gold: #a68a44; --bg: #050505; --card: #121212; --red: #ff4444; --blue: #0070f3; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: var(--bg); color: #ffffff; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

        /* HEADER UNIFICADO (Observación 1) */
        header { background: rgba(0,0,0,0.98); padding: 12px 15px; display: flex; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; gap: 12px; }
        .logo-vazz { display: flex; align-items: center; justify-content: center; background-color: transparent; height: 35px; }
        .logo-vazz img { max-height: 100%; max-width: 100%; }
        .brand-title { color: var(--gold); font-family: 'Playfair Display', serif; font-size: 14px; text-transform: uppercase; line-height: 1.2; font-weight: 800; }

        .ch-item { display: flex; flex-direction: column; align-items: center; text-align: center; opacity: 0.9; cursor: pointer; }
        .ch-logo { width: 44px; height: 44px; border-radius: 12px; border: 2.5px solid #222; margin-bottom: 6px; background: #000; object-fit: contain; }
        .active .ch-logo { border-color: var(--gold); }
        .ch-name { font-size: 6px; color: #ffffff; font-weight: 800; text-transform: uppercase; line-height: 1.1; width: 100%; }

        .card { background: var(--card); border-radius: 20px; margin-bottom: 30px; border: 1px solid #1a1a1a; overflow: hidden; }
        .card.playing { border-color: var(--gold); }
        .card-cover { width: 100%; height: 180px !important; background-size: cover; background-position: center; position: relative; border: 1.5px solid var(--gold); }
        .card-overlay { position: absolute; inset: 0; display: flex !important; align-items: center !important; justify-content: center !important; }
        .btn-play { background-color: var(--gold) !important; border: none !important; width: 55px !important; height: 55px !important; border-radius: 50% !important; display: flex !important; align-items: center !important; justify-content: center !important; cursor: pointer; padding: 0; }
        .btn-play svg { width: 28px !important; height: 28px !important; fill: black !important; }
        
        .info { padding: 20px; }
        .ep-title { margin: 8px 0 4px 0; font-size: 19px; font-weight: 800; color: #ffffff; display:flex; justify-content:space-between; align-items:start; gap:10px; }
        
        /* ESTILOS SOCIALES */
        .btn-like { background:none; border:none; cursor:pointer; font-size:18px; color:#555; transition:0.2s; display:flex; flex-direction:column; align-items:center; line-height:1; }
        .btn-like.liked { color: var(--red); transform: scale(1.1); animation: pop 0.3s ease; }
        .like-count { font-size: 9px; margin-top: 3px; font-weight: 800; color: #888; }
        .liked .like-count { color: var(--red); }
        @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.4)} 100%{transform:scale(1.1)} }

        .btn-list { background: #1a1a1a !important; border: 1.5px solid #333 !important; color: #ffffff !important; padding: 12px !important; border-radius: 12px !important; font-size: 11px !important; font-weight: 800 !important; width: 100% !important; cursor: pointer; margin-top:12px; }
        .list-box { display: none; margin-top: 15px; padding: 20px; background: #080808; border-radius: 15px; border: 1px solid #222; font-size: 14px; white-space: pre-wrap; }

        /* ESTILOS DE COMENTARIOS */
        .comments-section { display:none; margin-top:15px; background:#080808; border-radius:15px; padding:15px; border:1px solid #222; }
        .c-input { width:100%; background:#1a1a1a; border:1px solid #333; color:white; padding:10px; border-radius:8px; margin-bottom:8px; font-family:inherit; font-size:12px; }
        .c-btn { width:100%; background:#333; color:white; border:none; padding:10px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:11px; }
        .c-list { margin-top:15px; max-height:200px; overflow-y:auto; }

        .c-user { font-weight:800; color:var(--gold); font-size:11px; margin-bottom:2px; display:flex; justify-content:space-between; align-items:center; }
        .c-msg { font-size:12px; color:#ddd; line-height:1.3; }
        .c-reply { margin-top:6px; padding:8px; background:#111; border-left:2px solid var(--gold); border-radius:0 6px 6px 0; }
        .c-reply-head { font-size:9px; font-weight:900; color:var(--gold); margin-bottom:2px; }
        .c-reply-msg { font-size:11px; color:#fff; font-style:italic; }
        
        .btn-admin-reply { background:transparent; border:1px solid #444; color:#888; font-size:9px; padding:2px 6px; border-radius:4px; cursor:pointer; margin-left:5px; }
        .btn-admin-del { background:transparent; border:none; color:#ff4444; font-size:10px; cursor:pointer; margin-left:5px; }

        #global-player { position: fixed; bottom: 0; left: 0; width: 100%; background: #080808; border-top: 3px solid var(--gold); padding: 15px 20px; display: none; z-index: 1000; box-shadow: 0 -10px 30px rgba(0,0,0,0.8); }
        .p-vinyl { width: 55px; height: 55px; border-radius: 50%; border: 2.3px solid var(--gold); background-size: cover; animation: rot 4s linear infinite; animation-play-state: paused; flex-shrink: 0; }
        .playing .p-vinyl { animation-play-state: running; }
        @keyframes rot { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .controls { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #222; padding-top: 15px; margin-top: 12px; gap: 10px; }
        .ctrl-btn { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 12px 5px; border-radius: 12px; font-size: 9px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: 0.2s; }
        .ctrl-btn:active { transform: scale(0.95); border-color: var(--gold); }
        
        google-cast-launcher { width: 20px; height: 20px; --disconnected-color: var(--gold); cursor: pointer; display: inline-block; }
        
        .contador-oyentes { display: flex; align-items: center; gap: 5px; background: #1a1a1a; padding: 4px 10px; border-radius: 20px; border: 1px solid #333; font-size: 11px; color: #aaa; font-weight: bold; }
        .contador-oyentes span { color: var(--gold); }

        #visualizador { width: 100%; height: 35px; background: transparent; margin-top: 5px; margin-bottom: 5px; display: block; }

        /* =========================================
           ESTILOS DE LA BÓVEDA DEL LEGADO V5.1
           ========================================= */
        .jtbp-vault-bg { background: radial-gradient(circle, #222 10%, transparent 11%), #111; background-size: 10px 10px; border-top: 3px solid #D4AF37; padding: 40px 10px; text-align: center; border-radius: 20px; border: 1px solid #1a1a1a; margin-bottom: 30px; position: relative; }
        .baul-trigger { cursor: pointer; transition: transform 0.3s; margin-bottom: 20px; display: inline-block; }
        .baul-trigger:active { transform: scale(0.95); }
        .img-baul-final { width: 90px; border-radius: 12px; border: 2px solid #D4AF37; box-shadow: 0 0 20px var(--blue); }
        .gold-text { color: #D4AF37; text-transform: uppercase; letter-spacing: 2px; margin-top: 15px; font-size: 14px;}

        /* ESTILOS DE CATEGORÍAS (Observación 2) */
        .grid-2x2 { display: grid; grid-template-columns: 1fr; gap: 10px; text-align: left; }
        .categoria-titulo { grid-column: 1 / -1; color: var(--blue); border-bottom: 1px solid #333; margin-top: 15px; padding-bottom: 5px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; }
        
        /* GUILLOTINA PARA EL BOTÓN FOLLOW Y LOGO MIXCLOUD (Observación 3) */
        .mix-card { background: #000; border-radius: 5px; overflow: hidden; height: 55px; border: 1px solid #333; }
        .card-especial { border: 2px solid #D4AF37; box-shadow: 0 0 10px #D4AF37; }
        
        .timeline-swipe { display: flex; overflow-x: auto; gap: 15px; padding: 10px; justify-content: center; border-bottom: 1px solid var(--blue); margin-bottom: 20px; padding-bottom: 20px; }
        .year-btn { background: none; border: 1px solid #D4AF37; color: #D4AF37; padding: 6px 15px; border-radius: 20px; cursor: pointer; font-size: 12px; transition: 0.3s; font-family: inherit; font-weight: 800;}
        .year-btn.activo { background: #D4AF37; color: #000; box-shadow: 0 0 10px #D4AF37; }
    </style>

<script>
    window.MIS_ARCHIVOS_BOVEDA = [
        { año: 2025, categoria: "STUDIO 79", titulo: "Studio79 19/2025 *Especial Studio Mix Two*", url: "https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=%2FStudio79%2Fstudio79-192025-especial-studio-mix-two%2F" },
        { año: 2025, categoria: "STUDIO 79", titulo: "Studio79 18/2025 *Funky Fever*", url: "https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=%2FStudio79%2Fstudio79-182025-funky-fever%2F" },
        { año: 2025, categoria: "STUDIO 79", titulo: "Studio79 12/2025 *Disco Nights*", url: "https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=%2FStudio79%2Fstudio79-122025-disco-nights%2F" },
        { año: 2025, categoria: "JAZZTABUENO", titulo: "JazzTaBueno 04/2025 *Seductive Soul*", url: "https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=%2FJazzTaBueno%2Fjazztabueno-042025-seductive-soul%2F" },
        { año: 2025, categoria: "SALSA BRAVA", titulo: "SalsaBrava 07/2025 *Traigo Salsa*", url: "https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=%2FByJTB%2Fsalsabrava-072025-traigo-salsa%2F" },
        { año: 2025, categoria: "SALSA BRAVA", titulo: "SalsaBrava 06/2025 *1983*", url: "https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=%2FByJTB%2Fsalsabrava-062025-1983%2F" },
        { año: 2023, categoria: "OLD SCHOOL ROCK", titulo: "Old School Rock Radio 01/2023 *Slight Return*", url: "https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=%2Foldschoolradio%2Fold-school-rock-radio-012023-slight-return%2F" },
        { año: 2023, categoria: "OLD SCHOOL ROCK", titulo: "Old School Rock Radio 05/2023 *Bionic Grass*", url: "https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=%2Foldschoolradio%2Fold-school-rock-radio-052023-bionic-grass%2F" },
        { año: 2022, categoria: "JAZZTABUENO", titulo: "JazzTaBueno 34/2022 *Get Lucky*", url: "https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=%2FJazzTaBueno%2Fjazztabueno-342022-get-lucky%2F" }
    ];

    window.misReproductoresMixcloud = [];

    function abrirCerrarBaul() {
        const display = document.getElementById('contenido-baul');
        if(display.style.display === 'none') {
            display.style.display = 'block';
            mostrarPorAño(2025, document.getElementById('btn-2025')); 
        } else {
            display.style.display = 'none';
            document.getElementById('grid-archivos').innerHTML = ''; 
            window.misReproductoresMixcloud = []; 
        }
    }

    function mostrarPorAño(año, botonApretado) {
        const botones = document.querySelectorAll('.year-btn');
        botones.forEach(b => b.classList.remove('activo'));
        if(botonApretado) botonApretado.classList.add('activo');

        const grid = document.getElementById('grid-archivos');
        grid.innerHTML = ''; 
        window.misReproductoresMixcloud = []; 
        
        const filtrados = window.MIS_ARCHIVOS_BOVEDA.filter(item => item.año === año);

        if (filtrados.length === 0) {
            grid.innerHTML = `<p style="color:#D4AF37; text-align: center; grid-column: 1/-1;">Puliendo diamantes para ${año}...</p>`;
            return;
        }

        const categoriasUnicas = [...new Set(filtrados.map(item => item.categoria))];
        let idCounter = 0;

        categoriasUnicas.forEach(cat => {
            // Unificando nombre de la categoría (Observación 2)
            grid.innerHTML += `<div class="categoria-titulo">► ${cat}</div>`;
            
            const programasDeCat = filtrados.filter(item => item.categoria === cat);
            programasDeCat.forEach(item => {
                const esEspecial = item.titulo.toLowerCase().includes('especial');
                const clase = esEspecial ? 'card-especial' : '';
                
                // Agregando guillotinado para el botón FOLLOW y el logo (Observación 3)
                grid.innerHTML += `
                    <div class="mix-card ${clase}">
                        <iframe id="mix-iframe-${idCounter}" width="100%" height="60" src="${item.url}" frameborder="0" style="margin-top: -2px;"></iframe>
                    </div>`;
                idCounter++;
            });
        });

        // Conexión del "Cerebro" de Mixcloud para apagar los otros reproductores
        setTimeout(() => {
            if (typeof Mixcloud === 'undefined') return; 
            
            const iframes = document.querySelectorAll('.mix-card iframe');
            iframes.forEach(iframe => {
                try {
                    const widget = Mixcloud.PlayerWidget(iframe);
                    window.misReproductoresMixcloud.push({ id: iframe.id, reproductor: widget });
                    
                    widget.bind('play', function() {
                        const mainMedia = document.getElementById('main-media');
                        if(mainMedia && !mainMedia.paused) {
                            mainMedia.pause();
                            if(window.actualizarUI) window.actualizarUI();
                        }
                        
                        window.misReproductoresMixcloud.forEach(item => {
                            if (item.id !== iframe.id) {
                                item.reproductor.pause();
                            }
                        });
                    });
                } catch (error) {}
            });
        }, 1500);
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { initializeFirestore, collection, query, orderBy, onSnapshot, addDoc, deleteDoc, doc, updateDoc, increment, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAnalytics, logEvent } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";

    const firebaseConfig = { apiKey: "AIzaSyBwBq4gLgv4DSfUidzUuC7Irmvj_4pCTtI", authDomain: "familia-yajure-app.firebaseapp.com", projectId: "familia-yajure-app", storageBucket: "familia-yajure-app.firebasestorage.app", messagingSenderId: "692035727386", appId: "1:692035727386:web:dfa3e39a481d56368a61a3", measurementId: "G-GDBL4HPE79" };

    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, { experimentalForceLongPolling: true });
    
    let analytics;
    try { analytics = getAnalytics(app); logEvent(analytics, 'page_view'); } catch(e) {}

    const media = document.getElementById('main-media');
    const seekBar = document.getElementById('seek-bar');
    let programas = [];
    let currentRenderedList = []; 
    let idActual = null;
    let filtro = 'Todo';
    let hashtagFiltro = ''; 
    let isAdmin = false;

    let audioCtx, analyser, source;
    let isVisualizerRunning = false;
    const canvas = document.getElementById('visualizador');
    const ctx = canvas.getContext('2d');

    const SVG_PLAY = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
    const SVG_PAUSE = `<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;

    window.actualizarUI = () => { render(); }; 

    media.addEventListener('play', () => {
        if(window.misReproductoresMixcloud) {
            window.misReproductoresMixcloud.forEach(item => {
                try { item.reproductor.pause(); } catch(e){}
            });
        }
    });

    if(localStorage.getItem('jtp_auth') === 'ok') { 
        isAdmin = true; 
        document.getElementById('btn-salir').style.display = 'block';
    }
    
    window.doLogout = () => { localStorage.removeItem('jtp_auth'); location.reload(); };

    let taps = 0, lastTap = 0;
    document.getElementById('admin-trigger').onclick = () => {
        const now = new Date().getTime(); if(now - lastTap > 1000) taps = 0; lastTap = now; taps++;
        if(taps === 3) {
            if(!isAdmin) {
                const pass = prompt("🔐 DIRECTOR: Ingrese Clave de Cabina:");
                if(pass === "ticoadmin2026") {
                    localStorage.setItem('jtp_auth', 'ok');
                    isAdmin = true;
                    document.getElementById('admin-panel').style.display = 'block';
                    document.getElementById('btn-salir').style.display = 'block';
                    render();
                } else {
                    if(pass) alert("❌ Clave Incorrecta");
                }
            } else {
                document.getElementById('admin-panel').style.display = 'block';
            }
            taps = 0;
        }
    };
    
    window.setFilter = (cat, el) => { 
        filtro = cat; hashtagFiltro = ''; 
        document.querySelectorAll('.ch-item').forEach(i => i.classList.remove('active')); 
        el.classList.add('active'); render(); 
    };

    window.setHashtagFilter = (tag) => { hashtagFiltro = tag; render(); window.scrollTo({top:0, behavior:'smooth'}); };
    window.clearHashtag = () => { hashtagFiltro = ''; render(); };
    
    window.doLike = async (id, el) => {
        if(localStorage.getItem('jtp_like_' + id) === 'true') { alert("¡Ya le diste me gusta a este programa! ❤️"); return; }
        localStorage.setItem('jtp_like_' + id, 'true'); el.classList.add('liked');
        let countSpan = el.querySelector('.like-count'); let current = parseInt(countSpan.innerText || "0");
        el.innerHTML = `❤️ <span class="like-count">${current + 1}</span>`;
        try { await updateDoc(doc(db, "radio_programas", id), { likes: increment(1) }); } catch(e) {}
    };

    window.toggleComments = (id) => {
        const section = document.getElementById(`comments-${id}`);
        if(section.style.display === 'block') { section.style.display = 'none'; } 
        else { section.style.display = 'block'; window.cargarComentarios(id); }
    };

    window.cargarComentarios = (id) => {
        const listDiv = document.getElementById(`clist-${id}`);
        onSnapshot(query(collection(db, "radio_programas", id, "comentarios"), orderBy("fecha", "asc")), (snap) => {
            listDiv.innerHTML = "";
            if(snap.empty) { listDiv.innerHTML = "<div style='color:#666; font-size:11px; text-align:center;'>Sé el primero en comentar.</div>"; return; }
            snap.forEach(d => {
                const c = d.data(); const div = document.createElement('div'); div.className = 'c-item';
                let replyHtml = c.respuesta ? `<div class="c-reply"><div class="c-reply-head">🎙️ JTP OFICIAL:</div><div class="c-reply-msg">${c.respuesta}</div></div>` : "";
                let adminTools = isAdmin ? `<div style="display:flex; align-items:center;">` + (!c.respuesta ? `<button class="btn-admin-reply" onclick="window.responderCom('${id}', '${d.id}')">↩️ RESPONDER</button>` : "") + `<button class="btn-admin-del" onclick="window.borrarComentario('${id}', '${d.id}')">🗑️</button></div>` : "";
                div.innerHTML = `<div class="c-user"><span>${c.usuario}</span> ${adminTools}</div><div class="c-msg">${c.mensaje}</div>${replyHtml}`;
                listDiv.appendChild(div);
            });
            listDiv.scrollTop = listDiv.scrollHeight;
        });
    };

    window.enviarComentario = async (id) => {
        const userIn = document.getElementById(`cuser-${id}`); const msgIn = document.getElementById(`cmsg-${id}`); const btn = document.getElementById(`cbtn-${id}`);
        if(!userIn.value || !msgIn.value) return alert("Escribe nombre y mensaje");
        btn.disabled = true; btn.innerText = "...";
        try { await addDoc(collection(db, "radio_programas", id, "comentarios"), { usuario: userIn.value, mensaje: msgIn.value, fecha: new Date().getTime() }); msgIn.value = ""; } catch(e) {}
        btn.disabled = false; btn.innerText = "ENVIAR";
    };

    window.responderCom = async (progId, comId) => {
        const resp = prompt("Escribe tu respuesta oficial:");
        if(resp) { try { await updateDoc(doc(db, "radio_programas", progId, "comentarios", comId), { respuesta: resp }); } catch(e) {} }
    };

    window.borrarComentario = async (progId, comId) => {
        if(confirm("¿Borrar?")) { try { await deleteDoc(doc(db, "radio_programas", progId, "comentarios", comId)); } catch(e) {} }
    };

    function encenderVisualizador() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)(); analyser = audioCtx.createAnalyser();
            try { source = audioCtx.createMediaElementSource(media); source.connect(analyser); analyser.connect(audioCtx.destination); } catch(e) {}
            analyser.fftSize = 256; 
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (!isVisualizerRunning) pintarBarras();
    }

    function pintarBarras() {
        isVisualizerRunning = true; requestAnimationFrame(pintarBarras); if (!analyser) return;
        const bufferLength = analyser.frequencyBinCount; const dataArray = new Uint8Array(bufferLength); analyser.getByteFrequencyData(dataArray);
        const dpr = window.devicePixelRatio || 1; const displayWidth = canvas.clientWidth; const displayHeight = canvas.clientHeight;
        canvas.width = displayWidth * dpr; canvas.height = displayHeight * dpr; ctx.scale(dpr, dpr); ctx.clearRect(0, 0, displayWidth, displayHeight);
        const isMobile = displayWidth < 600; const barrasActivas = isMobile ? 40 : 80; const gap = isMobile ? 2 : 4; 
        const barWidth = (displayWidth / barrasActivas) - gap; let x = gap / 2;
        for (let i = 0; i < barrasActivas; i++) {
            const dataIndex = Math.floor(i * (bufferLength / 100)); 
            let barHeight = (dataArray[dataIndex] / 255) * displayHeight * 1.3; ctx.fillStyle = '#a68a44'; 
            const finalHeight = Math.max(barHeight, isMobile ? 3 : 4); ctx.fillRect(x, displayHeight - finalHeight, barWidth, finalHeight);
            x += barWidth + gap;
        }
    }
    
    window.playItem = async (id, url, tit, img) => {
        if(idActual === id) { window.doToggle(); } 
        else {
            idActual = id; window.castUrl = url; window.castTitle = tit; window.castCover = img; media.src = url; 
            let promesa = media.play();
            if (promesa !== undefined) { promesa.then(_ => { let memoria = localStorage.getItem('jtbp_mem_' + id); if(memoria && parseFloat(memoria) > 5) { media.currentTime = parseFloat(memoria); } encenderVisualizador(); }).catch(e => {}); }
            document.getElementById('p-title').innerText = tit; document.getElementById('p-vinyl').style.backgroundImage = `url('${img}')`; document.getElementById('global-player').style.display = 'block';
            if(analytics) logEvent(analytics, 'play_program', { program_name: tit });
            if(!localStorage.getItem('oyente_' + id)) {
                localStorage.setItem('oyente_' + id, 'true');
                try { await updateDoc(doc(db, "radio_programas", id), { reproducciones: increment(1) }); } catch(e) {}
            }
        }
        render();
    };

    window.doToggle = () => { media.paused ? (media.play(), encenderVisualizador()) : media.pause(); render(); };
    window.doClose = () => { media.pause(); document.getElementById('global-player').style.display='none'; idActual=null; render(); };
    window.toggleList = (id) => { const el = document.getElementById(`list-${id}`); el.style.display = el.style.display === 'block' ? 'none' : 'block'; };
    window.doSpeed = () => { const r = [1.0, 1.25, 1.5, 2.0]; media.playbackRate = r[(r.indexOf(media.playbackRate)+1)%r.length]; document.getElementById('btn-speed').innerText = media.playbackRate+"x"; };
    window.doMute = () => { media.muted = !media.muted; document.getElementById('btn-mute').innerText = media.muted ? "🔇 MUTE" : "🔊 VOL"; };
    window.cancelEdit = () => { document.getElementById('admin-panel').style.display='none'; document.getElementById('edit-id').value=""; };
    window.prepEdit = (id) => { const p = programas.find(x => x.id === id); document.getElementById('edit-id').value = p.id; document.getElementById('t-titulo').value = p.titulo; document.getElementById('t-programa').value = p.programa; document.getElementById('t-url').value = p.mp3Url; document.getElementById('t-img').value = p.imagenUrl; document.getElementById('t-tags').value = p.tags || ""; document.getElementById('t-playlist').value = p.playlist || ""; document.getElementById('admin-panel').style.display = 'block'; window.scrollTo({top:0, behavior:'smooth'}); };
    window.doDel = async (id) => { if(confirm("¿Borrar?")) await deleteDoc(doc(db, "radio_programas", id)); };

    document.getElementById('btn-save').onclick = async () => {
        const id = document.getElementById('edit-id').value;
        const data = { titulo: document.getElementById('t-titulo').value, programa: document.getElementById('t-programa').value, mp3Url: document.getElementById('t-url').value, imagenUrl: document.getElementById('t-img').value || "logo.png", tags: document.getElementById('t-tags').value, playlist: document.getElementById('t-playlist').value, fecha: new Date().getTime() };
        if(!id) { data.reproducciones = 0; data.likes = 0; }
        id ? await updateDoc(doc(db, "radio_programas", id), data) : await addDoc(collection(db, "radio_programas"), data);
        window.cancelEdit();
    };

    onSnapshot(query(collection(db, "radio_programas"), orderBy("fecha", "desc")), (snap) => { programas = []; snap.forEach(d => programas.push({id: d.id, ...d.data()})); render(); });

    function render() {
        const feed = document.getElementById('feed'); if(!feed) return; feed.innerHTML = "";
        if(hashtagFiltro !== '') { feed.innerHTML = `<div style="text-align:center; margin-bottom:20px;"><span style="background:var(--gold); color:black; padding:8px 15px; border-radius:20px; font-weight:bold; font-size:12px;">Buscando: ${hashtagFiltro} <span style="margin-left:10px; cursor:pointer;" onclick="window.clearHashtag()">✖ Quitar Filtro</span></span></div>`; }
        const list = programas.filter(p => {
            let matchCanal = filtro === 'Todo' ? true : (p.programa || "").toUpperCase().includes(filtro.toUpperCase().split(' ')[0]) || (p.titulo || "").toUpperCase().includes(filtro.toUpperCase().split(' ')[0]);
            let matchTag = hashtagFiltro === '' ? true : (p.tags || "").toLowerCase().includes(hashtagFiltro.toLowerCase());
            return matchCanal && matchTag;
        });
        currentRenderedList = list;
        list.forEach(p => {
            const isPlaying = idActual === p.id && !media.paused;
            const vistas = p.reproducciones || 0; const likes = p.likes || 0;
            const userLikedClass = localStorage.getItem('jtp_like_' + p.id) === 'true' ? 'liked' : '';
            const arrayTags = (p.tags || "").split(' ').filter(t => t.trim().startsWith('#'));
            let htmlTags = arrayTags.length > 0 ? `<div style="margin-top:6px;">` + arrayTags.map(t => `<span onclick="window.setHashtagFilter('${t}')" style="color:var(--gold); background:#222; padding:4px 10px; border-radius:12px; font-size:10px; font-weight:800; margin-right:5px; cursor:pointer; display:inline-block; border: 1px solid #333;">${t}</span>`).join('') + `</div>` : "";
            const div = document.createElement('div'); div.className = `card ${isPlaying ? 'playing' : ''}`;
            div.innerHTML = `<div class="card-cover" style="background-image: url('${p.imagenUrl}')"><div class="card-overlay"><button class="btn-play" onclick="window.playItem('${p.id}','${p.mp3Url}','${p.titulo}','${p.imagenUrl}')">${isPlaying ? SVG_PAUSE : SVG_PLAY}</button></div></div><div class="info"><div style="display:flex; justify-content:space-between; align-items:center;"><span style="color:var(--gold); font-size:9px; font-weight:900; text-transform:uppercase;">${p.programa}</span><div class="contador-oyentes">🎧 <span>${vistas}</span></div></div><div style="display:flex; justify-content:space-between; align-items:start; margin-top:8px;"><h3 class="ep-title" style="margin:0;">${p.titulo}</h3><button class="btn-like ${userLikedClass}" onclick="window.doLike('${p.id}', this)">❤️ <span class="like-count">${likes}</span></button></div>${htmlTags}<div style="display:flex; gap:10px;"><button class="btn-list" style="flex:1" onclick="window.toggleList('${p.id}')">📋 INFO</button><button class="btn-list" style="flex:1" onclick="window.toggleComments('${p.id}')">💬 CHAT</button></div><div id="list-${p.id}" class="list-box">${p.playlist || "Próximamente."}</div><div id="comments-${p.id}" class="comments-section"><div id="clist-${p.id}" class="c-list"></div><div style="margin-top:10px; padding-top:10px; border-top:1px solid #222;"><input type="text" id="cuser-${p.id}" class="c-input" placeholder="Tu Nombre"><textarea id="cmsg-${p.id}" class="c-input" placeholder="Tu Mensaje..."></textarea><button id="cbtn-${p.id}" class="c-btn" onclick="window.enviarComentario('${p.id}')">ENVIAR</button></div></div>${isAdmin ? `<div style="display:flex; gap:10px; margin-top:20px; border-top:1px solid #222; padding-top:20px;"><button onclick="window.prepEdit('${p.id}')" style="flex:1; background:transparent; border:1px solid var(--gold); color:var(--gold); padding:10px; border-radius:10px; font-weight:800;">🖋️ EDITAR</button><button onclick="window.doDel('${p.id}')" style="flex:1; background:transparent; border:1px solid #f44; color:#f44; padding:10px; border-radius:10px; font-weight:800;">🗑️ BORRAR</button></div>` : ''}</div>`;
            feed.appendChild(div);
        });
        const pBtn = document.getElementById('p-play-btn'); if(pBtn) pBtn.innerHTML = media.paused ? SVG_PLAY : SVG_PAUSE;
        if(!media.paused) document.getElementById('global-player').classList.add('playing'); else document.getElementById('global-player').classList.remove('playing');
    }

    media.ontimeupdate = () => { seekBar.value = media.currentTime; const m = Math.floor(media.currentTime/60), s = Math.floor(media.currentTime%60); const dm = isNaN(media.duration) ? 0 : Math.floor(media.duration/60), ds = isNaN(media.duration) ? 0 : Math.floor(media.duration%60); document.getElementById('p-time').innerText = `${m}:${s<10?'0':''}${s} / ${dm}:${ds<10?'0':''}${ds}`; if (idActual && media.currentTime > 5) { localStorage.setItem('jtbp_mem_' + idActual, media.currentTime); } };
    media.onloadedmetadata = () => { if(!isNaN(media.duration)) seekBar.max = media.duration; };
    media.onended = () => { if(idActual) localStorage.removeItem('jtbp_mem_' + idActual); if (currentRenderedList.length > 0) { let idxActual = currentRenderedList.findIndex(p => p.id === idActual); if (idxActual !== -1 && idxActual + 1 < currentRenderedList.length) { let siguiente = currentRenderedList[idxActual + 1]; window.playItem(siguiente.id, siguiente.mp3Url, siguiente.titulo, siguiente.imagenUrl); } else { window.doClose(); } } };
    seekBar.oninput = () => { media.currentTime = seekBar.value; };
</script>
