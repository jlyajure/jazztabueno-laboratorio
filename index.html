<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Jazztabueno Productions</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png">
    <meta name="theme-color" content="#050505">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://widget.mixcloud.com/media/js/widgetApi.js"></script>
    <style>
        :root { --gold: #a68a44; --bg: #050505; --card: #121212; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: var(--bg); color: #ffffff; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #080808; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
        header { background: rgba(0,0,0,0.98); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; }
        .brand-title { color: var(--gold); font-family: 'Playfair Display', serif; font-size: 14px; text-transform: uppercase; line-height: 1.2; letter-spacing: 0.5px; }
        .btn-salir { background: transparent !important; border: 2px solid var(--gold) !important; color: var(--gold) !important; padding: 7px 15px !important; border-radius: 8px !important; font-size: 10px !important; font-weight: 900 !important; cursor: pointer !important; display: block !important; }
        .btn-boveda-container { display: flex; align-items: center; gap: 8px; cursor: pointer; background: rgba(212, 175, 55, 0.1); padding: 5px 10px; border-radius: 12px; border: 1px solid var(--gold); }
        .btn-boveda-header { width: 38px; height: 38px; border-radius: 6px; object-fit: cover; }
        .btn-boveda-text { color: var(--gold); font-size: 9px; font-weight: 900; text-transform: uppercase; line-height: 1.1; text-align: right; }
        .container { max-width: 450px; margin: auto; padding: 15px; padding-bottom: 300px; }
        .channels-grid { display: grid !important; grid-template-columns: repeat(5, 1fr) !important; gap: 5px; margin-bottom: 25px; padding: 10px 0; }
        .ch-item { display: flex; flex-direction: column; align-items: center; text-align: center; opacity: 0.8; cursor: pointer; }
        .ch-item.active { opacity: 1; }
        .ch-logo { width: 44px; height: 44px; border-radius: 12px; border: 2.5px solid #222; margin-bottom: 6px; background: #000; object-fit: contain; }
        .active .ch-logo { border-color: var(--gold); }
        .ch-name { font-size: 6px; color: #ffffff; font-weight: 800; text-transform: uppercase; text-align: center; }
        .card { background: var(--card); border-radius: 20px; margin-bottom: 30px; border: 1px solid #1a1a1a; overflow: hidden; }
        .card.playing { border-color: var(--gold); }
        .card-cover { width: 100%; height: 180px; background-size: cover; background-position: center; position: relative; border-bottom: 1.5px solid var(--gold); }
        .card-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
        .btn-play { background-color: var(--gold); border: none; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-play svg { width: 28px; height: 28px; fill: black !important; }
        .info { padding: 20px; }
        .tag { background: rgba(166, 138, 68, 0.15); color: var(--gold); padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; margin-right: 5px; display: inline-block; margin-bottom: 10px; }
        .btn-list { background: #1a1a1a; border: 1.5px solid #333; color: #ffffff; padding: 12px; border-radius: 12px; font-size: 11px; font-weight: 800; width: 100%; cursor: pointer; margin-top:12px; }
        </style>
</head>
<body>
<div id="app-content">
    <header>
        <div style="display:flex; align-items:center; gap:12px; cursor:pointer;" id="admin-trigger">
            <img src="https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png" width="35" height="35">
            <div class="brand-title">JAZZTABUENO<br>PRODUCTIONS</div>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
            <div id="btn-boveda-header" class="btn-boveda-container" onclick="window.openVault()">
                <div class="btn-boveda-text">BÓVEDA DEL<br>LEGADO</div>
                <img src="https://i.postimg.cc/KjW3X8Gj/baul-ok.png" class="btn-boveda-header">
            </div>
            <button onclick="window.confirmarSalida()" class="btn-salir">SALIR</button>
        </div>
    </header>

    <div id="main-view" class="container">
        <div id="admin-panel" style="display:none; background:#111; padding:20px; border-radius:20px; border:2px solid var(--gold); margin-bottom:20px;">
            <input type="hidden" id="edit-id">
            <input type="text" id="t-titulo" style="width:100%; padding:10px; background:#000; color:#fff; border:1px solid #333; margin-bottom:10px;" placeholder="Título">
            <input type="text" id="t-url" style="width:100%; padding:10px; background:#000; color:#fff; border:1px solid #333;" placeholder="URL MP3">
            <button id="btn-save" style="width:100%; background:var(--gold); padding:10px; border:none; font-weight:bold; margin-top:10px;">GUARDAR</button>
        </div>
        <div class="channels-grid">
            <div class="ch-item active" onclick="window.setFilter('Todo', this)"><img src="https://i.postimg.cc/8c7Smws4/logos-programas-jtbp.jpg" class="ch-logo"><span class="ch-name">Todo</span></div>
            <div class="ch-item" onclick="window.setFilter('JAZZTABUENO', this)"><img src="https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png" class="ch-logo"><span class="ch-name">Jazz</span></div>
            <div class="ch-item" onclick="window.setFilter('STUDIO 79', this)"><img src="https://i.postimg.cc/NKMDbYJB/S79.png" class="ch-logo"><span class="ch-name">Studio</span></div>
            <div class="ch-item" onclick="window.setFilter('SALSA BRAVA', this)"><img src="https://i.postimg.cc/75fchgyt/Salsa-Brava.png" class="ch-logo"><span class="ch-name">Salsa</span></div>
            <div class="ch-item" onclick="window.setFilter('OLD SCHOOL RADIO', this)"><img src="https://i.postimg.cc/jwQ3mczC/Old-School-Radio.png" class="ch-logo"><span class="ch-name">Old School</span></div>
        </div>
        <div id="feed"></div>
    </div>
    <div id="vault-view" class="container" style="display:none;">
        <h2 style="color:var(--gold); text-align:center;">Bóveda del Legado</h2>
        <button onclick="window.closeVault()" class="btn-salir" style="margin: auto; margin-bottom: 20px;">⬅ VOLVER</button>
        <div id="grid-archivos"></div>
    </div>
</div>
<div id="global-player">
    <audio id="main-media" playsinline webkit-playsinline></audio>
    <div style="display:flex; align-items:center; gap:15px; margin-bottom:5px;">
        <div id="p-vinyl" class="p-vinyl" style="background-image: url('https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png');"></div>
        <div style="flex:1; overflow:hidden;"><h4 id="p-title" style="margin:0; font-size:14px; color:#fff;">...</h4></div>
        <button onclick="window.doToggle()" id="p-play-btn" style="background:none; border:none;"></button>
        <button onclick="window.doClose()" style="background:none; border:none; color:#666; font-size:24px;">×</button>
    </div>
    <input type="range" id="seek-bar" value="0" min="0" step="1" style="width:100%;">
</div>
<div id="pantalla-salida" style="display:none;">
    <img src="https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png" width="120">
    <h2 style="color:white; margin-top:20px;">Radio Detenida</h2>
    <button onclick="location.reload()" style="margin-top:30px; background:var(--gold); border:none; padding:12px 25px; border-radius:30px; font-weight:bold;">VOLVER</button>
</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyBwBq4gLgv4DSfUidzUuC7Irmvj_4pCTtI", authDomain: "familia-yajure-app.firebaseapp.com", projectId: "familia-yajure-app", storageBucket: "familia-yajure-app.firebasestorage.app", messagingSenderId: "692035727386", appId: "1:692035727386:web:dfa3e39a481d56368a61a3" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const media = document.getElementById('main-media');
    const seekBar = document.getElementById('seek-bar');
    let programas = []; let idActual = null; let filtro = 'Todo'; let isAdmin = false;

    const SVG_PLAY = `<svg viewBox="0 0 24 24" width="30"><path d="M8 5v14l11-7z" fill="white"/></svg>`;
    const SVG_PAUSE = `<svg viewBox="0 0 24 24" width="30"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" fill="white"/></svg>`;

    onSnapshot(query(collection(db, "radio_programas"), orderBy("fecha", "desc")), (snap) => {
        programas = []; snap.forEach(d => programas.push({id: d.id, ...d.data()}));
        render();
    });

    window.confirmarSalida = () => { if(confirm("¿Deseas detener la radio y salir?")) { media.pause(); document.getElementById('app-content').style.display='none'; document.getElementById('pantalla-salida').style.display='flex'; } };
    window.setFilter = (cat, el) => { filtro = cat; document.querySelectorAll('.ch-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); render(); };
    window.openVault = () => { document.getElementById('main-view').style.display = 'none'; document.getElementById('vault-view').style.display = 'block'; };
    window.closeVault = () => { document.getElementById('vault-view').style.display = 'none'; document.getElementById('main-view').style.display = 'block'; };
    function render() {
        const feed = document.getElementById('feed'); if(!feed) return; feed.innerHTML = "";
        const filtered = (filtro === 'Todo') ? programas : programas.filter(p => p.programa === filtro);
        filtered.forEach(p => {
            const isPlaying = idActual === p.id && !media.paused;
            const div = document.createElement('div'); div.className = 'card';
            div.innerHTML = `
                <div class="card-cover" style="background-image: url('${p.imagenUrl}')">
                    <div class="card-overlay"><button class="btn-play" onclick="window.playItem('${p.id}','${p.mp3Url}','${p.titulo}','${p.imagenUrl}')">${isPlaying ? SVG_PAUSE : SVG_PLAY}</button></div>
                </div>
                <div class="info">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <span style="color:var(--gold); font-size:10px; font-weight:900;">${p.programa}</span>
                        <div style="color:var(--gold); font-size:12px; font-weight:800;">🎧 <span>${p.reproducciones || 0}</span></div>
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:start;">
                        <h3 style="margin:0; font-size:22px; color:#fff; font-weight:800; flex:1;">${p.titulo}</h3>
                        <div style="text-align:center; margin-left:15px;"><span style="font-size:20px;">❤️</span><span style="display:block; font-size:10px; color:var(--gold); font-weight:900;">${p.likes || 0}</span></div>
                    </div>
                    <div style="margin-top:10px; margin-bottom:15px;">
                        <span class="tag">#jazz</span><span class="tag">#radio</span><span class="tag">#jtb</span>
                    </div>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-list" style="flex:1" onclick="window.playItem('${p.id}','${p.mp3Url}','${p.titulo}','${p.imagenUrl}')">ESCUCHAR</button>
                        <button class="btn-list" style="flex:1">💬 CHAT</button>
                    </div>
                    ${isAdmin ? `<div style="display:flex; gap:10px; margin-top:15px;"><button class="btn-list" style="border-color:var(--gold)">EDITAR</button></div>` : ''}
                </div>`;
            feed.appendChild(div);
        });
        document.getElementById('p-play-btn').innerHTML = media.paused ? SVG_PLAY : SVG_PAUSE;
    }

    window.playItem = async (id, url, tit, img) => {
        if(idActual === id) { if(media.paused) media.play(); else media.pause(); } 
        else {
            idActual = id; media.pause();
            /* BLINDAJE AUDIO ARCHIVE.ORG */
            media.removeAttribute('crossorigin');
            media.src = url; media.load();
            document.getElementById('p-title').innerText = tit;
            document.getElementById('p-vinyl').style.backgroundImage = `url('${img}')`;
            document.getElementById('global-player').style.display = 'block';
            try { await media.play(); } catch(e) {}
        }
        render();
    };

    window.doToggle = () => { if(media.paused) media.play(); else media.pause(); render(); };
    window.doClose = () => { media.pause(); document.getElementById('global-player').style.display='none'; idActual=null; render(); };
    media.ontimeupdate = () => { seekBar.value = media.currentTime; };

    let taps = 0, lastTap = 0;
    document.getElementById('admin-trigger').onclick = () => {
        const now = new Date().getTime(); if(now - lastTap > 1000) taps = 0; lastTap = now; taps++;
        if(taps === 3) {
            const p = prompt("Clave:"); if(p === "ticoadmin2026") { isAdmin = true; document.getElementById('admin-panel').style.display='block'; render(); }
            taps = 0;
        }
    };
</script>
</body>
</html>
