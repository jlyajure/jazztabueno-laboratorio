<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Jazztabueno</title>
    
    <link rel="icon" type="image/png" href="https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png">
    <meta name="theme-color" content="#050505">
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://widget.mixcloud.com/media/js/widgetApi.js"></script>

    <style>
        :root { --gold: #a68a44; --bg: #050505; --card: #121212; --red: #ff4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: var(--bg); color: #ffffff; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

        header { background: rgba(0,0,0,0.98); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .brand-title { color: var(--gold); font-family: 'Playfair Display', serif; font-size: 14px; text-transform: uppercase; line-height: 1.2; letter-spacing: 0.5px; }
        
        .btn-boveda-container { display: flex; align-items: center; gap: 8px; cursor: pointer; background: rgba(212, 175, 55, 0.1); padding: 5px 10px; border-radius: 12px; border: 1px solid var(--gold); }
        .btn-boveda-header { width: 38px; height: 38px; border-radius: 6px; box-shadow: 0 0 10px #0070f3; object-fit: cover; }
        .btn-boveda-text { color: var(--gold); font-size: 9px; font-weight: 900; text-transform: uppercase; line-height: 1.1; text-align: right; }

        .container { max-width: 450px; margin: auto; padding: 15px; padding-bottom: 300px; }
        .channels-grid { display: grid !important; grid-template-columns: repeat(5, 1fr) !important; gap: 5px; margin-bottom: 25px; padding: 10px 0; }
        .ch-item { display: flex; flex-direction: column; align-items: center; text-align: center; cursor: pointer; }
        .ch-logo { width: 44px; height: 44px; border-radius: 12px; border: 2.5px solid #222; margin-bottom: 6px; background: #000; object-fit: contain; }
        .active .ch-logo { border-color: var(--gold); }
        .ch-name { font-size: 6px; color: #ffffff; font-weight: 800; text-transform: uppercase; }

        .jtbp-vault-bg { background: radial-gradient(circle, #222 10%, transparent 11%), #111; background-size: 10px 10px; border-top: 3px solid #D4AF37; padding: 20px 10px; text-align: center; border-radius: 20px; border: 1px solid #1a1a1a; margin-bottom: 30px; }
        
        /* 🔥 FIX DE DESLIZAMIENTO DE AÑOS 🔥 */
        .timeline-swipe {
            display: flex; overflow-x: auto; gap: 12px; padding: 10px 20px; 
            justify-content: flex-start; border-bottom: 1px solid #0070f3; margin-bottom: 20px; 
            padding-bottom: 15px; scrollbar-width: thin; scrollbar-color: var(--gold) #1a1a1a;
            -webkit-overflow-scrolling: touch; flex-wrap: nowrap;
        }
        .year-btn { 
            background: none; border: 1px solid #D4AF37; color: #D4AF37; padding: 6px 18px; 
            border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: bold; flex-shrink: 0;
        }
        .year-btn.activo { background: #D4AF37; color: #000; box-shadow: 0 0 10px #D4AF37; }

        .grid-vault { display: grid; grid-template-columns: 1fr; gap: 10px; text-align: left; }
        .categoria-titulo-vault { color: #0070f3; border-bottom: 1px solid #333; margin-top: 15px; padding-bottom: 5px; font-size: 12px; text-transform: uppercase; font-weight: bold;}
        .mix-card-v { background: #000; border-radius: 5px; overflow: hidden; height: 60px; border: 1px solid #333; margin-bottom: 5px;}
        
        #global-player { position: fixed; bottom: 0; left: 0; width: 100%; background: #080808; border-top: 3px solid var(--gold); padding: 15px 20px; display: none; z-index: 1000; }
        .p-vinyl { width: 55px; height: 55px; border-radius: 50%; border: 2.3px solid var(--gold); background-size: cover; animation: rot 4s linear infinite; flex-shrink: 0; }
        @keyframes rot { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="app-content">
    <header>
        <div style="display:flex; align-items:center; gap:12px;">
            <img src="https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png" width="35" height="35">
            <div class="brand-title">JAZZTABUENO<br>PRODUCTIONS</div>
        </div>
        <div class="btn-boveda-container" onclick="window.openVault()">
            <div class="btn-boveda-text">BÓVEDA DEL<br>LEGADO</div>
            <img src="baul.png" onerror="this.src='https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png'" class="btn-boveda-header">
        </div>
    </header>

    <div id="main-view" class="container">
        <div class="channels-grid">
            <div class="ch-item active"><img src="https://i.postimg.cc/8c7Smws4/logos-programas-jtbp.jpg" class="ch-logo"><span class="ch-name">Todo</span></div>
        </div>
        <div id="feed">
             <p style="text-align:center; color:#666;">Cargando programas VIP...</p>
        </div>
    </div>
    
    <div id="vault-view" class="container" style="display:none;">
        <section class="jtbp-vault-bg">
            <div class="vault-header-bar" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="color:var(--gold); margin:0; font-size:14px; text-transform:uppercase;">Bóveda del Legado</h2>
                <button onclick="window.closeVault()" style="background:#111; border:1px solid var(--gold); color:var(--gold); padding:8px 15px; border-radius:8px;">VOLVER</button>
            </div>
            
            <div class="timeline-swipe">
                <button class="year-btn" id="btn-2025" onclick="window.mostrarPorAño(2025, this)">2025</button>
                <button class="year-btn" onclick="window.mostrarPorAño(2024, this)">2024</button>
                <button class="year-btn" onclick="window.mostrarPorAño(2023, this)">2023</button>
                <button class="year-btn" onclick="window.mostrarPorAño(2022, this)">2022</button>
                <button class="year-btn" onclick="window.mostrarPorAño(2021, this)">2021</button>
                <button class="year-btn" onclick="window.mostrarPorAño(2020, this)">2020</button>
            </div>
            <div id="grid-archivos" class="grid-vault"></div>
        </section>
    </div>
</div>

<script>
    // 🎯 AQUÍ ESTÁ TU LISTA DE PROGRAMAS (window.MIS_ARCHIVOS_BOVEDA)
    window.MIS_ARCHIVOS_BOVEDA = [
        /* === 2025 === */
        { año: 2025, categoria: "Studio 79", titulo: "Especial Studio Mix Two", url: "https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=%2FStudio79%2Fstudio79-192025-especial-studio-mix-two%2F", plataforma: "mixcloud" },
        { año: 2025, categoria: "Studio 79", titulo: "Funky Fever", url: "https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=%2FStudio79%2Fstudio79-182025-funky-fever%2F", plataforma: "mixcloud" },
        { año: 2025, categoria: "Studio 79", titulo: "You Win Again", url: "https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=%2FStudio79%2Fstudio79-172025-you-win-again%2F", plataforma: "mixcloud" },
        { año: 2025, categoria: "Studio 79", titulo: "Be Good", url: "https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=%2FStudio79%2Fstudio79-162025-be-good%2F", plataforma: "mixcloud" },
        { año: 2025, categoria: "Studio 79", titulo: "Moonlight Deadline", url: "https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=%2FStudio79%2Fstudio79-152025-moonlight-deadline%2F", plataforma: "mixcloud" },
        { año: 2025, categoria: "Studio 79", titulo: "Especial Music IA", url: "https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=%2FStudio79%2Fstudio79-142025-especial-music-ia%2F", plataforma: "mixcloud" },
        
        // ✅ PROGRAMA 13 AGREGADO POR PEPE
        { año: 2025, categoria: "Studio 79", titulo: "Especial Studio Mix One", url: "https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=%2FStudio79%2Fstudio79-132025-especial-studio-mix-two%2F", plataforma: "mixcloud" },

        { año: 2025, categoria: "Studio 79", titulo: "Disco Nights", url: "https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=%2FStudio79%2Fstudio79-122025-disco-nights%2F", plataforma: "mixcloud" },
        
        // ✅ PROGRAMA 11 REPARADO (CORREGIDO 112025)
        { año: 2025, categoria: "Studio 79", titulo: "Rhythm & Blues", url: "https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=%2FStudio79%2Fstudio79-112025-rhythm-blues%2F", plataforma: "mixcloud" },

        { año: 2025, categoria: "JAZZTABUENO", titulo: "Seductive Soul", url: "https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=%2FJazzTaBueno%2Fjazztabueno-042025-seductive-soul%2F", plataforma: "mixcloud" },
        /* === Años anteriores === */
        { año: 2024, categoria: "STUDIO 79", titulo: "Programa 5 Clásico", url: "https://archive.org/download/studio-79-programa-5/Studio%2079%20Programa%205.mp3", plataforma: "archive" },
        { año: 2020, categoria: "STUDIO 79", titulo: "Programa 4", url: "https://archive.org/download/studio-79-programa-4-2020/Studio%2079%20Programa%204-2020.mp3", plataforma: "archive" }
    ];

    window.openVault = () => {
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('vault-view').style.display = 'block';
        window.mostrarPorAño(2025, document.getElementById('btn-2025')); 
    };

    window.closeVault = () => {
        document.getElementById('vault-view').style.display = 'none';
        document.getElementById('main-view').style.display = 'block';
    };

    window.mostrarPorAño = (año, boton) => {
        document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('activo'));
        if(boton) boton.classList.add('activo');
        const grid = document.getElementById('grid-archivos');
        const filtrados = window.MIS_ARCHIVOS_BOVEDA.filter(item => item.año === año);
        let html = "";
        const cats = [...new Set(filtrados.map(item => item.categoria))];
        cats.forEach(cat => {
            html += `<div class="categoria-titulo-vault">► ${cat}</div>`;
            filtrados.filter(i => i.categoria === cat).forEach(i => {
                if (i.plataforma === 'mixcloud') {
                    html += `<div class="mix-card-v"><iframe width="100%" height="60" src="${i.url}" frameborder="0"></iframe></div>`;
                } else {
                    html += `<div style="padding:10px; background:#222; margin-bottom:5px; border-radius:5px; font-size:12px;">🎵 ${i.titulo} (Enlace Archive)</div>`;
                }
            });
        });
        grid.innerHTML = html || "<p style='color:#666;'>No hay programas en este año.</p>";
    };
</script>
</body>
</html>
