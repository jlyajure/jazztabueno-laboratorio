<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Jazztabueno VIP Multicanal</title>
    
    <link rel="icon" type="image/png" href="https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png">
    <meta name="theme-color" content="#050505">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Jazztabueno Productions">
    <meta property="og:description" content="Escucha nuestros programas exclusivos de Radio.">
    <meta property="og:image" itemprop="image" content="https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png">
    
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <script src="https://widget.mixcloud.com/media/js/widgetApi.js"></script>
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>

    <style>
        .control-panel { background-color: #111; padding: 15px; border-radius: 15px; border: 1px solid var(--gold); box-shadow: 0 5px 15px rgba(0,0,0,0.8); width: 100%; margin-bottom: 25px; }
        .panel-title { color: var(--gold); font-size: 12px; font-weight: bold; text-align: center; margin-bottom: 10px; text-transform: uppercase; }
        
        .channel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .channel-btn:last-child { grid-column: span 3; }

        .channel-btn { background-color: #000; color: #fff; border: 1px solid #333; padding: 10px 5px; border-radius: 8px; cursor: pointer; font-size: 10px; font-weight: bold; text-transform: uppercase; transition: all 0.2s ease; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; }
        .channel-btn .icon { font-size: 16px; }
        .channel-btn.active { background-color: var(--gold) !important; color: #000 !important; border-color: var(--gold) !important; }

        .player-stage { width: 100%; min-height: 400px; border-radius: 15px; overflow: hidden; display: flex; align-items: flex-start; justify-content: center; }
        
        .jtbp-panel { display: none !important; width: 100%; height: 100%; }
        .jtbp-panel.active { display: block !important; }
        
        .iframe-container iframe { width: 100%; height: 400px; border: none; display: block; border-radius: 15px; border: 1px solid #333; }
    </style>
</head>
<body>

<div id="app-content">
    
    <header>
        <div style="display:flex; align-items:center; gap:12px; cursor:pointer;" id="admin-trigger">
            <img src="logo.png" width="35" height="35" onerror="this.src='https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png'">
            <div class="brand-title">JAZZTABUENO<br>PRODUCTIONS</div>
        </div>
        
        <div style="display:flex; align-items:center; gap:12px;">
            <div id="btn-boveda-header" class="btn-boveda-container" onclick="window.openVault()">
                <div class="btn-boveda-text">BÓVEDA DEL<br>LEGADO</div>
                <img src="baul.png" onerror="this.src='baul.jpg'" class="btn-boveda-header" alt="Baúl">
            </div>
            
            <button id="btn-volver-header" onclick="window.closeVault()">⬅ VOLVER</button>
            <button onclick="window.doLogout()" class="btn-salir" id="btn-salir">SALIR</button>
        </div>
    </header>

    <div class="container">
        <div class="control-panel">
            <div class="panel-title">Selector Multicanal VIP</div>
            <div class="channel-grid">
                <button class="channel-btn active" onclick="switchInput('canal-jtbp', this)">
                    <span class="icon">🎙️</span> JTBP Orig.
                </button>
                <button class="channel-btn" onclick="switchInput('canal-youtube', this)">
                    <span class="icon">📺</span> YouTube
                </button>
                <button class="channel-btn" onclick="switchInput('canal-mixcloud', this)">
                    <span class="icon">☁️</span> Mixcloud
                </button>
                <button class="channel-btn" onclick="switchInput('canal-spotify', this)">
                    <span class="icon">🎧</span> Spotify*
                </button>
                <button class="channel-btn" onclick="switchInput('canal-jazz', this)">
                    <span class="icon">🎷</span> Jazz List
                </button>
                <button class="channel-btn" onclick="switchInput('canal-salsa', this)">
                    <span class="icon">🕺</span> Salsa List
                </button>
                <button class="channel-btn" onclick="switchInput('canal-retro', this)">
                    <span class="icon">🪩</span> Retro List
                </button>
            </div>
        </div>
    </div>

    <div class="player-stage container">
        
        <div id="canal-jtbp" class="jtbp-panel active">
            <div id="main-view">
                
                <div id="admin-panel" style="display:none; background:#111; padding:25px; border-radius:25px; border:2px solid var(--gold); margin-bottom:30px;">
                    <input type="hidden" id="edit-id">
                    <input type="text" id="t-titulo" style="width:100%; padding:14px; background:#000; color:white; border:1px solid #333; border-radius:10px; margin-bottom:10px;" placeholder="Título">
                    <select id="t-programa" style="width:100%; padding:14px; background:#000; color:white; border:1px solid #333; border-radius:10px; margin-bottom:10px;">
                        <option value="JAZZTABUENO">JAZZTABUENO</option>
                        <option value="STUDIO 79">STUDIO 79</option>
                        <option value="SALSA BRAVA">SALSA BRAVA</option>
                        <option value="OLD SCHOOL RADIO">OLD SCHOOL RADIO</option>
                    </select>
                    <input type="text" id="t-url" style="width:100%; padding:14px; background:#000; color:white; border:1px solid #333; border-radius:10px; margin-bottom:10px;" placeholder="URL MP3">
                    <input type="text" id="t-img" style="width:100%; padding:14px; background:#000; color:white; border:1px solid #333; border-radius:10px; margin-bottom:10px;" placeholder="URL Portada">
                    <input type="text" id="t-tags" style="width:100%; padding:14px; background:#000; color:white; border:1px solid #333; border-radius:10px; margin-bottom:10px;" placeholder="Hashtags (Ej: #BossaNova #80s)">
                    <textarea id="t-playlist" style="width:100%; height:120px; background:#000; color:white; border:1px solid var(--gold); border-radius:10px; padding:10px; margin-bottom:15px;" placeholder="Lista..."></textarea>
                    
                    <label style="color:var(--gold); font-size:12px; margin-bottom:5px; display:block; font-weight:bold;">📅 Fecha de Estreno (Opcional):</label>
                    <input type="date" id="t-estreno" style="width:100%; padding:14px; background:#000; color:white; border:1px solid #333; border-radius:10px; margin-bottom:15px;">

                    <div style="display:flex; gap:10px;">
                        <button id="btn-save" style="flex:2; background:var(--gold); border:none; padding:15px; border-radius:12px; font-weight:800; cursor:pointer;">💾 GUARDAR</button>
                        <button onclick="window.cancelEdit()" style="flex:1; background:transparent; border:1px solid #444; color:#888; border-radius:12px; cursor:pointer;">❌</button>
                    </div>
                </div>

                <div class="channels-grid">
                    <div class="ch-item active" onclick="window.setFilter('Todo', this)"><img src="https://i.postimg.cc/8c7Smws4/logos-programas-jtbp.jpg" class="ch-logo"><span class="ch-name">Todo</span></div>
                    <div class="ch-item" onclick="window.setFilter('JAZZTABUENO', this)"><img src="https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png" class="ch-logo"><span class="ch-name">Jazztabueno</span></div>
                    <div class="ch-item" onclick="window.setFilter('STUDIO 79', this)"><img src="https://i.postimg.cc/NKMDbYJB/S79.png" class="ch-logo"><span class="ch-name">Studio 79</span></div>
                    <div class="ch-item" onclick="window.setFilter('SALSA BRAVA', this)"><img src="https://i.postimg.cc/75fchgyt/Salsa-Brava.png" class="ch-logo"><span class="ch-name">Salsa Brava</span></div>
                    <div class="ch-item" onclick="window.setFilter('OLD SCHOOL RADIO', this)"><img src="https://i.postimg.cc/jwQ3mczC/Old-School-Radio.png" class="ch-logo"><span class="ch-name">Old School Radio</span></div>
                </div>
                
                <div id="feed"></div>
            </div>
        </div>

        <div id="canal-youtube" class="jtbp-panel iframe-container">
            <iframe src="https://www.youtube.com/embed/videoseries?list=PL8F6B0753B2FAA435" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>

        <div id="canal-mixcloud" class="jtbp-panel iframe-container">
            <iframe src="https://www.mixcloud.com/widget/iframe/?hide_cover=1&feed=%2FNTSRadio%2Fmoxie-15th-september-2021%2F" frameborder="0"></iframe>
        </div>

        <div id="canal-spotify" class="jtbp-panel iframe-container">
            <iframe src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe>
        </div>

        <div id="canal-jazz" class="jtbp-panel iframe-container">
             <iframe src="https://www.youtube.com/embed/videoseries?list=PL8F6B0753B2FAA435" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>

        <div id="canal-salsa" class="jtbp-panel iframe-container">
             <iframe src="https://www.youtube.com/embed/videoseries?list=PL9o1bT7_x1_xZlBq7bE0eZ4rW2c7_sTq1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>

        <div id="canal-retro" class="jtbp-panel iframe-container">
             <iframe src="https://www.youtube.com/embed/videoseries?list=PLCD0445C57F2B7F41" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>

    </div>
    
    <div id="vault-view" class="container" style="display:none;">
        <section class="jtbp-vault-bg">
            <div class="vault-header-bar" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="color:var(--gold); margin:0; font-size:14px; text-transform:uppercase; letter-spacing:1px; text-align: left;">Bóveda del Legado</h2>
            </div>
            <br>
            <div class="alerta-gala">
                <i>⭐ <strong>Nota:</strong> Los programas con marco iluminado son <strong>Ediciones Especiales</strong>.</i>
            </div>
            <div class="timeline-swipe">
                <button class="year-btn" id="btn-2025" onclick="window.mostrarPorAño(2025, this)">2025</button>
                <button class="year-btn" onclick="window.mostrarPorAño(2024, this)">2024</button>
                <button class="year-btn" onclick="window.mostrarPorAño(2023, this)">2023</button>
                <button class="year-btn" onclick="window.mostrarPorAño(2022, this)">2022</button>
                <button class="year-btn" onclick="window.mostrarPorAño(2021, this)">2021</button>
                <button class="year-btn" onclick="window.mostrarPorAño(2020, this)">2020</button>
            </div>
            <br>
            <div id="grid-archivos" class="grid-vault"></div>
        </section>
    </div>
</div>

<div id="global-player">
    <audio id="main-media" crossorigin="anonymous" playsinline webkit-playsinline></audio>
    <div style="display:flex; align-items:center; gap:15px; margin-bottom:5px;">
        <div id="p-vinyl" class="p-vinyl" style="background-image: url('https://i.postimg.cc/zVD4mstP/Jazztabueno-(2).png');"></div>
        <div style="flex:1; overflow:hidden;">
            <h4 id="p-title" style="margin:0; font-size:15px; color:#ffffff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:800;">...</h4>
            <div id="p-time" style="font-size:12px; color:var(--gold); font-weight:900; margin-top:3px;">00:00 / 00:00</div>
        </div>
        <button onclick="window.doToggle()" id="p-play-btn" style="background:none; border:none; cursor:pointer; flex-shrink: 0;"></button>
        <button onclick="window.doClose()" style="background:none; border:none; color:#666; font-size:28px; flex-shrink: 0;">×</button>
    </div>
    <canvas id="visualizador"></canvas>
    <input type="range" id="seek-bar" value="0" min="0" step="1" style="width:100%;">
    <div class="controls">
        <div class="ctrl-btn" style="display:flex; align-items:center; gap:8px;">
            <google-cast-launcher></google-cast-launcher><span style="color:var(--gold);">Google TV</span>
        </div>
        <button onclick="window.doSpeed()" id="btn-speed" class="ctrl-btn">1.0x</button>
        <button onclick="window.doMute()" id="btn-mute" class="ctrl-btn">🔊 VOL</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics-compat.js"></script>
<script src="app.js"></script>

<script>
    function switchInput(inputId, btnElement) {
        // Pausar reproductor global si te sales del canal JTBP
        if (inputId !== 'canal-jtbp' && typeof window.doClose === 'function') {
            window.doClose();
        }

        document.querySelectorAll('.jtbp-panel').forEach(function(el) {
            el.classList.remove('active');
        });
        document.querySelectorAll('.channel-btn').forEach(function(el) {
            el.classList.remove('active');
        });
        
        document.getElementById(inputId).classList.add('active');
        btnElement.classList.add('active');
    }
</script>

</body>
</html>
